<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stocks & Achats</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>
<script>
  window.onerror = function (msg, url, line, col, error) {
    var root = document.getElementById("root");
    if (root) {
      root.innerHTML = '<pre style="white-space:pre-wrap;padding:20px;color:#8B3A2B;font-family:monospace;font-size:13px;">Erreur JS : ' +
        msg + '\nLigne : ' + line + '\n\n' + (error && error.stack ? error.stack : '') + '</pre>';
    }
    return false;
  };
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// ⚠️ REMPLACE ces deux valeurs par les tiennes (Project Settings > API dans Supabase)
const SUPABASE_URL = "https://zmsoyzghjgoybjktsiaq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_dzIZpLxSaYDXCbq5DNXpjQ_WLr0_TMH";

// Petites icônes simples (remplacent lucide-react, pas disponible en CDN)
const ICONS = {
  plus: "+", trash: "\u{1F5D1}\u{FE0F}", clipboard: "\u{1F4CB}", clipboardCheck: "\u2705",
  package: "\u{1F4E6}", truck: "\u{1F69A}", grid: "\u25A6", x: "\u2715", check: "\u2713",
  loader: "\u23F3", mail: "\u2709\uFE0F", file: "\u{1F4C4}", printer: "\u{1F5A8}\uFE0F", history: "\u{1F553}"
};
function Icon({ name, size = 16, className = "" }) {
  return <span className={className} style={{ fontSize: size, lineHeight: 1, display: "inline-block" }}>{ICONS[name] || ""}</span>;
}


const UNITS = ["kg", "g", "L", "mL", "pièce", "carton", "botte"];
const DEFAULT_CATEGORIES = ["Légumes", "Viandes", "Poissons", "Crèmerie", "Épicerie", "Boissons", "Autre"];
const DEFAULT_ZONES = ["Salle", "Cuisine"];

const uid = () => Math.random().toString(36).slice(2, 10);

const emptyProduct = (categories = DEFAULT_CATEGORIES) => ({
  id: uid(), name: "", category: categories[0] || "", unit: UNITS[0], packaging: "",
  orderUnit: "", unitsPerOrder: 1, zone: "",
  quantity: 0, suppliers: [], preferredSupplierId: "",
});

// Renvoie la ligne fournisseur préférée d'un produit (ou la première dispo)
const getPreferred = (product) =>
  (product.suppliers || []).find((s) => s.supplierId === product.preferredSupplierId) || (product.suppliers || [])[0] || null;

// Renvoie l'unité utilisée pour passer commande (conditionnement si défini, sinon l'unité de stock)
const getOrderUnit = (product) => {
  const size = Number(product.unitsPerOrder) > 0 ? Number(product.unitsPerOrder) : 1;
  const label = product.orderUnit?.trim() ? product.orderUnit.trim() : product.unit;
  return { label, size };
};
const emptySupplier = () => ({ id: uid(), name: "", contact: "", phone: "", email1: "", email2: "" });

const formatDate = (iso) => new Date(iso).toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

const seedData = () => ({
  products: [
    { id: uid(), name: "Pommes de terre", category: "Légumes", unit: "kg", packaging: "Sac de 25 kg", orderUnit: "sac", unitsPerOrder: 25, quantity: 12, suppliers: [{ supplierId: "s1", price: 1.2, packPrice: "30", ref: "PDT-25" }], preferredSupplierId: "s1" },
    { id: uid(), name: "Filet de bœuf", category: "Viandes", unit: "kg", packaging: "Pièce entière ~2,5 kg", orderUnit: "pièce", unitsPerOrder: 2.5, quantity: 3, suppliers: [{ supplierId: "s2", price: 28, packPrice: "70", ref: "BOV-FIL-01" }, { supplierId: "s3", price: 29.5, packPrice: "73.75", ref: "" }], preferredSupplierId: "s2" },
    { id: uid(), name: "Crème liquide", category: "Crèmerie", unit: "L", packaging: "Carton de 6 x 1L", orderUnit: "carton", unitsPerOrder: 6, quantity: 4, suppliers: [{ supplierId: "s3", price: 3.4, packPrice: "20.40", ref: "4009" }], preferredSupplierId: "s3" },
    { id: uid(), name: "Farine T55", category: "Épicerie", unit: "kg", packaging: "Sac de 10 kg", orderUnit: "sac", unitsPerOrder: 10, quantity: 20, suppliers: [{ supplierId: "s3", price: 0.9, packPrice: "9", ref: "2210" }], preferredSupplierId: "s3" },
  ],
  suppliers: [
    { id: "s1", name: "Primeurs du Marché", contact: "Julien", phone: "06 12 34 56 78", email1: "julien@primeursdumarche.fr", email2: "" },
    { id: "s2", name: "Boucherie Lambert", contact: "Marie", phone: "06 98 76 54 32", email1: "marie@boucherielambert.fr", email2: "" },
    { id: "s3", name: "Metro Gros", contact: "Service pro", phone: "01 23 45 67 89", email1: "commandes@metro-gros.fr", email2: "compta@metro-gros.fr" },
  ],
  // Commandes en attente : [{ productId, quantity }]
  pendingOrders: [],
  // Historique des inventaires : [{ id, date, items: [{ productId, name, quantity }] }]
  inventories: [],
  restaurantName: "",
  // Historique des bons de commande envoyés : [{ id, date, supplierId, supplierName, items, total, sent }]
  orderHistory: [],
  categories: [...DEFAULT_CATEGORIES],
  zones: [...DEFAULT_ZONES],
});

function useStore() {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState("loading");
  const [loadError, setLoadError] = useState("");

  const headers = {
    "apikey": SUPABASE_ANON_KEY,
    "Content-Type": "application/json",
  };

  useEffect(() => {
    (async () => {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.resto&select=data`, { headers });
        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`Connexion Supabase impossible (${res.status}) : ${errText}`);
        }
        const rows = await res.json();
        const stored = rows && rows[0] && rows[0].data;
        if (stored && Object.keys(stored).length > 0) {
          const parsed = stored;
          if (!parsed.pendingOrders) parsed.pendingOrders = [];
          if (!parsed.inventories) parsed.inventories = [];
          if (parsed.restaurantName === undefined) parsed.restaurantName = "";
          if (!parsed.orderHistory) parsed.orderHistory = [];
          if (!parsed.categories || !parsed.categories.length) parsed.categories = [...DEFAULT_CATEGORIES];
          if (!parsed.zones || !parsed.zones.length) parsed.zones = [...DEFAULT_ZONES];
          setData(parsed);
        } else setData(seedData());
        setStatus("ready");
      } catch (e) {
        setStatus("error");
        setLoadError(e.message || String(e));
      }
    })();
  }, []);

  const save = async (next) => {
    setData(next);
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.resto`, {
        method: "PATCH",
        headers,
        body: JSON.stringify({ data: next }),
      });
      if (!res.ok) {
        const errText = await res.text();
        console.error("Erreur de sauvegarde Supabase :", res.status, errText);
      }
    } catch (e) {
      console.error("Erreur de sauvegarde :", e);
    }
  };

  return { data, save, status, loadError };
}

function Field({ label, children }) {
  return (
    <label className="flex flex-col gap-1 text-[11px] uppercase tracking-wide text-[#5B5A50]">
      {label}
      {children}
    </label>
  );
}

const inputCls = "w-full bg-white border border-[#1F2421]/20 rounded-none px-2 py-1.5 text-sm text-[#1F2421] focus:outline-none focus:ring-2 focus:ring-[#2F4F3E] font-['IBM_Plex_Mono',monospace] box-border";

function App() {
  const { data, save, status, loadError } = useStore();
  const [tab, setTab] = useState("dashboard");
  const [editingProduct, setEditingProduct] = useState(null);
  const [editingSupplier, setEditingSupplier] = useState(null);
  const [inInventory, setInInventory] = useState(false);
  const [printingKey, setPrintingKey] = useState(null);

  const suppliersById = useMemo(() => {
    if (!data) return {};
    return Object.fromEntries(data.suppliers.map((s) => [s.id, s]));
  }, [data]);

  const pendingOrders = data?.pendingOrders || [];
  const inventories = data?.inventories || [];
  const orderHistory = data?.orderHistory || [];

  const orderBySupplier = useMemo(() => {
    if (!data) return {};
    const groups = {};
    pendingOrders.forEach((order) => {
      const p = data.products.find((x) => x.id === order.productId);
      if (!p) return;
      const pref = getPreferred(p);
      const orderUnit = getOrderUnit(p);
      const key = pref?.supplierId || "none";
      const qty = Number(order.quantity) || 0;
      if (!groups[key]) groups[key] = [];
      groups[key].push({ ...p, _price: pref?.price || 0, _ref: pref?.ref || "", _qty: qty, _orderUnit: orderUnit, _stockEquiv: qty * orderUnit.size });
    });
    return groups;
  }, [data, pendingOrders]);

  const totalOrderCount = pendingOrders.length;

  if (status === "error") {
    return (
      <div className="min-h-screen flex items-center justify-center p-6" style={{ backgroundColor: "#F5F2EC" }}>
        <div className="max-w-md text-center">
          <p className="font-medium text-[#8B3A2B] mb-2">Impossible de charger les données</p>
          <p className="text-sm text-[#5B5A50] font-['IBM_Plex_Mono',monospace] whitespace-pre-wrap">{loadError}</p>
        </div>
      </div>
    );
  }

  if (status === "loading" || !data) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ backgroundColor: "#F5F2EC" }}>
        <Icon name="loader" className="animate-spin text-[#2F4F3E]" size={28} />
      </div>
    );
  }

  const updateProduct = (p) => {
    const exists = data.products.some((x) => x.id === p.id);
    const products = exists ? data.products.map((x) => (x.id === p.id ? p : x)) : [...data.products, p];
    save({ ...data, products });
    setEditingProduct(null);
  };
  const deleteProduct = (id) =>
    save({ ...data, products: data.products.filter((p) => p.id !== id), pendingOrders: pendingOrders.filter((o) => o.productId !== id) });

  const updateSupplier = (s) => {
    const exists = data.suppliers.some((x) => x.id === s.id);
    const suppliers = exists ? data.suppliers.map((x) => (x.id === s.id ? s : x)) : [...data.suppliers, s];
    save({ ...data, suppliers });
    setEditingSupplier(null);
  };
  const deleteSupplier = (id) => save({ ...data, suppliers: data.suppliers.filter((s) => s.id !== id) });

  const adjustQty = (id, delta) => {
    save({
      ...data,
      products: data.products.map((p) =>
        p.id === id ? { ...p, quantity: Math.max(0, Math.round((Number(p.quantity) + delta) * 100) / 100) } : p
      ),
    });
  };

  // Ajoute ou met à jour la quantité commandée pour un produit
  const setOrderQuantity = (productId, quantity) => {
    const exists = pendingOrders.some((o) => o.productId === productId);
    const next = exists
      ? pendingOrders.map((o) => (o.productId === productId ? { ...o, quantity } : o))
      : [...pendingOrders, { productId, quantity }];
    save({ ...data, pendingOrders: next });
  };
  const removeOrder = (productId) => save({ ...data, pendingOrders: pendingOrders.filter((o) => o.productId !== productId) });

  // Termine un inventaire : met à jour les stocks comptés, ajoute les commandes choisies, garde une trace dans l'historique
  const finishInventory = ({ counts, orders }) => {
    const products = data.products.map((p) =>
      counts[p.id] !== undefined ? { ...p, quantity: Number(counts[p.id]) || 0 } : p
    );

    let nextOrders = [...pendingOrders];
    Object.entries(orders).forEach(([productId, qty]) => {
      const n = Number(qty);
      const exists = nextOrders.some((o) => o.productId === productId);
      if (n > 0) {
        nextOrders = exists
          ? nextOrders.map((o) => (o.productId === productId ? { ...o, quantity: n } : o))
          : [...nextOrders, { productId, quantity: n }];
      } else if (exists) {
        nextOrders = nextOrders.filter((o) => o.productId !== productId);
      }
    });

    const record = {
      id: uid(),
      date: new Date().toISOString(),
      items: data.products.map((p) => ({ productId: p.id, name: p.name, quantity: Number(counts[p.id] ?? p.quantity) || 0 })),
    };

    save({ ...data, products, pendingOrders: nextOrders, inventories: [record, ...inventories] });
    setInInventory(false);
    setTab(Object.keys(orders).some((k) => Number(orders[k]) > 0) ? "commandes" : "stock");
  };

  const deleteInventory = (id) => save({ ...data, inventories: inventories.filter((i) => i.id !== id) });

  // Archive le bon de commande d'un fournisseur comme envoyé, et le retire des commandes en attente
  const markOrderSent = (supplierKey) => {
    const items = orderBySupplier[supplierKey] || [];
    if (items.length === 0) return;
    const supplier = suppliersById[supplierKey];
    const record = {
      id: uid(),
      date: new Date().toISOString(),
      supplierId: supplierKey,
      supplierName: supplier?.name || "Sans fournisseur",
      items: items.map((p) => ({ name: p.name, ref: p._ref, quantity: p._qty, unit: p._orderUnit.label, price: p._price, stockEquiv: p._stockEquiv })),
      total: items.reduce((s, p) => s + Number(p._stockEquiv) * Number(p._price), 0),
      sent: true,
    };
    const productIds = new Set(items.map((p) => p.id));
    save({
      ...data,
      pendingOrders: pendingOrders.filter((o) => !productIds.has(o.productId)),
      orderHistory: [record, ...orderHistory],
    });
  };

  const deleteHistoryEntry = (id) => save({ ...data, orderHistory: orderHistory.filter((h) => h.id !== id) });

  const addCategory = (name) => {
    const n = name.trim();
    if (!n || data.categories.includes(n)) return;
    save({ ...data, categories: [...data.categories, n] });
  };
  const removeCategory = (name) => save({ ...data, categories: data.categories.filter((c) => c !== name) });

  const addZone = (name) => {
    const n = name.trim();
    if (!n || data.zones.includes(n)) return;
    save({ ...data, zones: [...data.zones, n] });
  };
  const removeZone = (name) => save({ ...data, zones: data.zones.filter((z) => z !== name) });

  const NAV = [
    { id: "dashboard", label: "Tableau de bord", icon: "grid" },
    { id: "stock", label: "Stock", icon: "package" },
    { id: "inventaires", label: "Inventaires", icon: "clipboardCheck" },
    { id: "commandes", label: "Commandes", icon: "clipboard" },
    { id: "historique", label: "Historique", icon: "history" },
    { id: "fournisseurs", label: "Fournisseurs", icon: "truck" },
  ];

  return (
    <div className="min-h-screen text-[#1F2421]" style={{ fontFamily: "'Newsreader', Georgia, serif", backgroundColor: "#F5F2EC" }}>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
      `}</style>

      <header className="text-white px-5 py-4 sm:px-8" style={{ backgroundColor: "#1F2421" }}>
        <div className="max-w-5xl mx-auto flex items-center justify-between">
          <div>
            <div className="text-[10px] uppercase tracking-[0.2em] text-[#C98A2B] font-['IBM_Plex_Mono',monospace]">Restachat</div>
            <h1 className="text-2xl sm:text-3xl font-medium">Stocks &amp; Achats</h1>
            <div className="text-xs text-white/60 mt-0.5">par Avedi</div>
          </div>
          {totalOrderCount > 0 && (
            <div className="flex items-center gap-2 text-[#C98A2B] text-sm font-['IBM_Plex_Mono',monospace]">
              <Icon name="clipboard" size={16} />
              {totalOrderCount} en commande
            </div>
          )}
        </div>
      </header>

      {editingProduct ? (
        <main className="max-w-5xl mx-auto p-5 sm:p-8">
          <ProductPage
            product={editingProduct}
            suppliers={data.suppliers}
            categories={data.categories}
            zones={data.zones}
            onAddCategory={addCategory}
            onRemoveCategory={removeCategory}
            onAddZone={addZone}
            onRemoveZone={removeZone}
            onSave={updateProduct}
            onCancel={() => setEditingProduct(null)}
          />
        </main>
      ) : editingSupplier ? (
        <main className="max-w-5xl mx-auto p-5 sm:p-8">
          <SupplierPage
            supplier={editingSupplier}
            onSave={updateSupplier}
            onCancel={() => setEditingSupplier(null)}
          />
        </main>
      ) : inInventory ? (
        <main className="max-w-5xl mx-auto p-5 sm:p-8">
          <InventoryPage
            products={data.products}
            suppliersById={suppliersById}
            pendingOrders={pendingOrders}
            onCancel={() => setInInventory(false)}
            onFinish={finishInventory}
          />
        </main>
      ) : printingKey ? (
        <OrderPrintPage
          supplier={suppliersById[printingKey]}
          items={orderBySupplier[printingKey] || []}
          restaurantName={data.restaurantName}
          onSetRestaurantName={(name) => save({ ...data, restaurantName: name })}
          onClose={() => setPrintingKey(null)}
        />
      ) : (
        <>
          <nav className="text-white sticky top-0 z-10 shadow-sm" style={{ backgroundColor: "#2F4F3E" }}>
            <div className="max-w-5xl mx-auto flex overflow-x-auto">
              {NAV.map(({ id, label, icon }) => (
                <button
                  key={id}
                  onClick={() => setTab(id)}
                  style={{ backgroundColor: tab === id ? "#28402F" : "transparent" }}
                  className={`flex items-center gap-2 px-4 sm:px-5 py-3 text-sm whitespace-nowrap border-b-2 transition-colors ${
                    tab === id ? "border-[#C98A2B]" : "border-transparent"
                  }`}
                >
                  <Icon name={icon} size={15} /> {label}
                  {id === "commandes" && totalOrderCount > 0 && (
                    <span className="text-[#1F2421] text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center" style={{ backgroundColor: "#C98A2B" }}>
                      {totalOrderCount}
                    </span>
                  )}
                </button>
              ))}
            </div>
          </nav>

          <main className="max-w-5xl mx-auto p-5 sm:p-8">
            {tab === "dashboard" && (
              <Dashboard data={data} orderBySupplier={orderBySupplier} suppliersById={suppliersById} setTab={setTab} onStartInventory={() => setInInventory(true)} />
            )}

            {tab === "stock" && (
              <StockView
                products={data.products}
                suppliersById={suppliersById}
                onEdit={setEditingProduct}
                onAdjust={adjustQty}
                onDelete={deleteProduct}
                onAdd={() => setEditingProduct(emptyProduct(data.categories))}
                pendingOrders={pendingOrders}
                onSetOrderQuantity={setOrderQuantity}
                onRemoveOrder={removeOrder}
              />
            )}

            {tab === "inventaires" && (
              <InventoriesView inventories={inventories} onStart={() => setInInventory(true)} onDelete={deleteInventory} />
            )}

            {tab === "commandes" && (
              <CommandesView orderBySupplier={orderBySupplier} suppliersById={suppliersById} onRemoveOrder={removeOrder} onPrint={setPrintingKey} onMarkSent={markOrderSent} />
            )}

            {tab === "historique" && (
              <Icon name="history"View orderHistory={orderHistory} orderBySupplier={orderBySupplier} suppliersById={suppliersById} onDelete={deleteHistoryEntry} onMarkSent={markOrderSent} />
            )}

            {tab === "fournisseurs" && (
              <FournisseursView
                suppliers={data.suppliers}
                products={data.products}
                onEdit={setEditingSupplier}
                onDelete={deleteSupplier}
                onAdd={() => setEditingSupplier(emptySupplier())}
              />
            )}
          </main>
        </>
      )}
    </div>
  );
}

function Dashboard({ data, orderBySupplier, suppliersById, setTab, onStartInventory }) {
  const totalValue = data.products.reduce((sum, p) => sum + Number(p.quantity) * Number(getPreferred(p)?.price || 0), 0);
  const pendingItems = Object.values(orderBySupplier).flat();
  const pendingTotal = pendingItems.reduce((s, p) => s + Number(p._stockEquiv) * Number(p._price), 0);

  return (
    <div className="space-y-6">
      <button
        onClick={onStartInventory}
        className="flex items-center justify-center gap-2 w-full py-3 text-sm font-medium text-white"
        style={{ backgroundColor: "#2F4F3E" }}
      >
        <Icon name="clipboardCheck" size={16} /> Démarrer l'inventaire de la semaine
      </button>

      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
        <StatCard label="Références en stock" value={data.products.length} />
        <StatCard label="Valeur du stock" value={`${totalValue.toFixed(0)} €`} />
        <StatCard label="Fournisseurs" value={data.suppliers.length} />
      </div>

      <div>
        <h2 className="text-lg font-medium mb-3 flex items-center gap-2">
          <Icon name="clipboard" size={18} className="text-[#C98A2B]" /> Commandes en attente
        </h2>
        {pendingItems.length === 0 ? (
          <p className="text-sm text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">Aucune commande en attente. Va dans l'onglet Stock pour en ajouter.</p>
        ) : (
          <>
            <div className="grid sm:grid-cols-2 gap-3">
              {pendingItems.map((p) => (
                <div key={p.id} className="border border-[#1F2421]/15 bg-white px-4 py-3 flex items-center justify-between">
                  <div>
                    <div className="font-medium">{p.name}</div>
                    <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">
                      {p._qty} {p._orderUnit.label} · {suppliersById[getPreferred(p)?.supplierId]?.name || "—"}
                    </div>
                  </div>
                  <span className="text-sm font-['IBM_Plex_Mono',monospace] text-[#C98A2B]">
                    {(p._stockEquiv * p._price).toFixed(2)} €
                  </span>
                </div>
              ))}
            </div>
            <div className="mt-3 flex items-center justify-between">
              <button onClick={() => setTab("commandes")} className="text-sm text-[#2F4F3E] underline underline-offset-2">
                Voir les bons de commande par fournisseur →
              </button>
              <span className="text-sm font-['IBM_Plex_Mono',monospace] font-medium">≈ {pendingTotal.toFixed(2)} €</span>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function StatCard({ label, value }) {
  return (
    <div className="text-white px-4 py-3" style={{ backgroundColor: "#1F2421" }}>
      <div className="text-2xl font-['IBM_Plex_Mono',monospace] font-medium">{value}</div>
      <div className="text-[10px] uppercase tracking-wide text-white/70 mt-1">{label}</div>
    </div>
  );
}

function StockView({ products, suppliersById, onEdit, onAdjust, onDelete, onAdd, pendingOrders, onSetOrderQuantity, onRemoveOrder }) {
  const [orderingId, setOrderingId] = useState(null);
  const [draftQty, setDraftQty] = useState("1");

  const startOrder = (p, existing) => {
    setOrderingId(p.id);
    setDraftQty(existing ? String(existing.quantity) : "1");
  };
  const confirmOrder = (productId) => {
    const q = Number(draftQty);
    if (!q || q <= 0) return;
    onSetOrderQuantity(productId, q);
    setOrderingId(null);
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-medium">Inventaire</h2>
        <button onClick={onAdd} className="flex items-center gap-1.5 text-white text-sm px-3 py-2" style={{ backgroundColor: "#2F4F3E" }}>
          <Icon name="plus" size={15} /> Ajouter un produit
        </button>
      </div>
      <div className="space-y-2">
        {products.map((p) => {
          const pref = getPreferred(p);
          const altCount = (p.suppliers || []).length - (pref ? 1 : 0);
          const orderUnit = getOrderUnit(p);
          const existingOrder = pendingOrders.find((o) => o.productId === p.id);
          const isOrdering = orderingId === p.id;
          return (
            <div key={p.id} className="bg-white border border-[#1F2421]/10 px-3 py-2.5">
              <div className="flex items-center gap-2">
                <span className="font-medium truncate">{p.name}</span>
                <span className="text-[10px] uppercase text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">{p.category}</span>
                {p.zone && <span className="text-[10px] uppercase text-[#2F4F3E] border border-[#2F4F3E]/30 px-1">{p.zone}</span>}
              </div>
              <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace] mb-2">
                {pref ? (
                  <>★ {suppliersById[pref.supplierId]?.name || "—"} · {Number(pref.price).toFixed(2)} €/{p.unit}{pref.ref && <> · réf. {pref.ref}</>}</>
                ) : (
                  "Sans fournisseur"
                )}
                {altCount > 0 && <> · +{altCount} autre{altCount > 1 ? "s" : ""}</>}
                {p.packaging && <> · {p.packaging}</>}
              </div>

              <div className="flex flex-wrap items-center gap-2 font-['IBM_Plex_Mono',monospace]">
                <button onClick={() => onAdjust(p.id, -1)} className="w-7 h-7 border border-[#1F2421]/20 hover:bg-[#F5F2EC]">−</button>
                <span className="w-14 text-center text-sm">{p.quantity} {p.unit}</span>
                <button onClick={() => onAdjust(p.id, 1)} className="w-7 h-7 border border-[#1F2421]/20 hover:bg-[#F5F2EC]">+</button>

                {!isOrdering && (
                  <button
                    onClick={() => startOrder(p, existingOrder)}
                    disabled={!pref}
                    className="flex items-center gap-1 text-xs px-2 py-1.5 border"
                    style={existingOrder
                      ? { backgroundColor: "#2F4F3E", color: "#FFFFFF", borderColor: "#2F4F3E" }
                      : { color: pref ? "#1F2421" : "#5B5A50", borderColor: "#1F2421", opacity: pref ? 1 : 0.4 }
                    }
                  >
                    <Icon name="clipboard" size={13} /> {existingOrder ? `Commandé : ${existingOrder.quantity} ${orderUnit.label}` : "Commander"}
                  </button>
                )}
                <span className="flex-1" />
                <button onClick={() => onEdit(p)} className="text-xs text-[#2F4F3E] underline underline-offset-2 px-1">modifier</button>
                <button onClick={() => onDelete(p.id)} className="text-[#8B3A2B] p-1"><Icon name="trash" size={15} /></button>
              </div>

              {isOrdering && (
                <div className="mt-2 pt-2 border-t border-[#1F2421]/10 flex flex-wrap items-center gap-2">
                  <span className="text-xs text-[#5B5A50] uppercase tracking-wide">Quantité à commander</span>
                  <input
                    type="number" step="0.1" autoFocus
                    className={`${inputCls} max-w-[90px]`}
                    value={draftQty}
                    onChange={(e) => setDraftQty(e.target.value)}
                  />
                  <span className="text-xs text-[#5B5A50]">
                    {orderUnit.label}{orderUnit.size > 1 && Number(draftQty) > 0 && (
                      <> (≈ {(Number(draftQty) * orderUnit.size).toFixed(1)} {p.unit})</>
                    )}
                  </span>
                  <button
                    onClick={() => confirmOrder(p.id)}
                    className="flex items-center gap-1 text-xs px-2 py-1.5 font-medium"
                    style={{ backgroundColor: "#2F4F3E", color: "#FFFFFF" }}
                  >
                    <Icon name="check" size={13} /> Valider
                  </button>
                  {existingOrder && (
                    <button
                      onClick={() => { onRemoveOrder(p.id); setOrderingId(null); }}
                      className="text-xs text-[#8B3A2B] underline underline-offset-2"
                    >
                      Retirer de la commande
                    </button>
                  )}
                  <button onClick={() => setOrderingId(null)} className="text-xs text-[#5B5A50] underline underline-offset-2">
                    Annuler
                  </button>
                </div>
              )}
            </div>
          );
        })}
        {products.length === 0 && <p className="text-sm text-[#5B5A50]">Aucun produit. Ajoute ton premier article.</p>}
      </div>
    </div>
  );
}

      <div className="flex items-center justify-between">
        <h2 className="text-lg font-medium">Inventaires</h2>
        <button onClick={onStart} className="flex items-center gap-1.5 text-white text-sm px-3 py-2" style={{ backgroundColor: "#2F4F3E" }}>
          <Icon name="clipboardCheck" size={15} /> Nouvel inventaire
        </button>
      </div>
      <p className="text-sm text-[#5B5A50]">
        Fais le tour de tes stocks une fois par semaine : compte chaque produit et passe tes commandes directement au même endroit.
      </p>
      {inventories.length === 0 ? (
        <p className="text-sm text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">Aucun inventaire enregistré pour le moment.</p>
      ) : (
        <div className="space-y-2">
          {inventories.map((inv) => (
            <div key={inv.id} className="bg-white border border-[#1F2421]/15 px-4 py-3 flex items-center justify-between gap-3">
              <div className="min-w-0">
                <div className="font-medium capitalize truncate">{formatDate(inv.date)}</div>
                <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">{inv.items.length} produits comptés</div>
              </div>
              <button onClick={() => onDelete(inv.id)} className="text-[#8B3A2B] p-1 shrink-0" aria-label="Supprimer"><Icon name="trash" size={15} /></button>

function InventoryPage({ products, suppliersById, pendingOrders, onCancel, onFinish }) {
  const [counts, setCounts] = useState(() => Object.fromEntries(products.map((p) => [p.id, "0"])));
  const [orders, setOrders] = useState(() =>
    Object.fromEntries(products.map((p) => {
      const existing = pendingOrders.find((o) => o.productId === p.id);
      return [p.id, existing ? String(existing.quantity) : ""];
    }))
  );

  return (
    <Page
      title={`Inventaire du ${formatDate(new Date().toISOString())}`}
      onCancel={onCancel}
      onSave={() => onFinish({ counts, orders })}
      saveLabel="Terminer l'inventaire"
    >
      <p className="text-xs text-[#5B5A50] mb-3">
        Compte chaque produit et, si besoin, indique directement la quantité à commander auprès du fournisseur préféré.
      </p>
      <div className="space-y-2">
        {products.map((p) => {
          const pref = getPreferred(p);
          const orderUnit = getOrderUnit(p);
          const orderQty = Number(orders[p.id]);
          return (
            <div key={p.id} className="border border-[#1F2421]/10 px-3 py-2.5">
              <div className="flex items-center gap-2">
                <span className="font-medium truncate">{p.name}</span>
                <span className="text-[10px] uppercase text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">{p.category}</span>
                {p.zone && <span className="text-[10px] uppercase text-[#2F4F3E] border border-[#2F4F3E]/30 px-1">{p.zone}</span>}
              </div>
              <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace] mb-2">
                {pref ? `★ ${suppliersById[pref.supplierId]?.name || "—"}` : "Sans fournisseur"}
                {p.packaging && <> · {p.packaging}</>}
              </div>
              <div className="grid grid-cols-2 gap-2">
                <Field label={`Stock compté (${p.unit})`}>
                  <input
                    type="number" step="0.1"
                    className={inputCls}
                    value={counts[p.id]}
                    onChange={(e) => setCounts({ ...counts, [p.id]: e.target.value })}
                  />
                </Field>
                <Field label={`À commander (${orderUnit.label})`}>
                  <input
                    type="number" step="0.1"
                    className={inputCls}
                    placeholder="—"
                    disabled={!pref}
                    value={orders[p.id]}
                    onChange={(e) => setOrders({ ...orders, [p.id]: e.target.value })}
                  />
                </Field>
              </div>
              {orderUnit.size > 1 && orderQty > 0 && (
                <p className="text-[11px] text-[#5B5A50] mt-1">≈ {(orderQty * orderUnit.size).toFixed(1)} {p.unit}</p>
              )}
            </div>
          );
        })}
      </div>
      <div className="mt-5 pt-4 border-t border-[#1F2421]/15">
        <button onClick={onCancel} className="w-full py-2.5 text-sm text-[#5B5A50] underline underline-offset-2">Annuler</button>
      </div>
    </Page>
  );
}

function CommandesView({ orderBySupplier, suppliersById, onRemoveOrder, onPrint, onMarkSent }) {
  const [copiedKey, setCopiedKey] = useState(null);
  const keys = Object.keys(orderBySupplier);
  if (keys.length === 0) {
    return <p className="text-sm text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">Aucune commande à passer pour le moment. Ajoutes-en depuis l'onglet Stock ou un inventaire.</p>;
  }
  return (
    <div className="space-y-6">
      <h2 className="text-lg font-medium">Bons de commande</h2>
      {keys.map((key) => {
        const supplier = suppliersById[key];
        const items = orderBySupplier[key];
        const total = items.reduce((s, p) => s + Number(p._stockEquiv) * Number(p._price), 0);
        const emails = [supplier?.email1, supplier?.email2].filter(Boolean).join(", ");
        const mailSubject = `Commande fournisseur — ${supplier?.name || ""}`;
        const mailBody =
          `Bonjour,\n\nMerci de bien vouloir préparer la commande suivante :\n\n` +
          items.map((p) => `- ${p.name}${p._ref ? ` (réf. ${p._ref})` : ""} : ${p._qty} ${p._orderUnit.label}${p.packaging ? ` (${p.packaging})` : ""}`).join("\n") +
          `\n\nMerci d'avance,\n`;
        const fullMessage = (emails ? `À : ${emails}\n` : "") + `Objet : ${mailSubject}\n\n${mailBody}`;
        const mailtoHref = `mailto:${emails}?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(mailBody)}`;
        const copyMessage = async () => {
          try {
            await navigator.clipboard.writeText(fullMessage);
            setCopiedKey(key);
            setTimeout(() => setCopiedKey((k) => (k === key ? null : k)), 2000);
          } catch {
            setCopiedKey("error-" + key);
          }
        };
        return (
          <div key={key} className="bg-white border border-[#1F2421]/15">
            <div className="text-white px-4 py-2 flex items-center justify-between gap-3" style={{ backgroundColor: "#1F2421" }}>
              <div className="min-w-0">
                <div className="font-medium truncate">{supplier?.name || "Sans fournisseur"}</div>
                {supplier?.phone && <div className="text-xs text-white/70 font-['IBM_Plex_Mono',monospace]">{supplier.phone}</div>}
              </div>
              <div className="text-sm font-['IBM_Plex_Mono',monospace] text-[#C98A2B] shrink-0">≈ {total.toFixed(2)} €</div>
            </div>
            <div className="divide-y divide-[#1F2421]/10">
              {items.map((p) => (
                <div key={p.id} className="flex items-center justify-between px-4 py-2.5 text-sm gap-3">
                  <span>
                    {p.name}
                    {p._ref && <span className="text-xs text-[#5B5A50] block">réf. {p._ref}</span>}
                    {p.packaging && <span className="text-xs text-[#5B5A50] block">{p.packaging}</span>}
                  </span>
                  <span className="flex items-center gap-2 shrink-0">
                    <span className="font-['IBM_Plex_Mono',monospace] text-[#5B5A50] text-right">
                      {p._qty} {p._orderUnit.label}
                    </span>
                    <button onClick={() => onRemoveOrder(p.id)} className="text-[#8B3A2B] p-1" aria-label="Retirer">
                      <Icon name="x" size={14} />
                    </button>
                  </span>
                </div>
              ))}
            </div>
            <div className="px-4 py-3 border-t border-[#1F2421]/10 space-y-2">
              <button
                onClick={() => onMarkSent(key)}
                className="flex items-center justify-center gap-2 w-full py-2.5 text-sm font-medium text-white"
                style={{ backgroundColor: "#C98A2B" }}
              >
                <Icon name="check" size={15} /> Marquer comme envoyée
              </button>
              <button
                onClick={() => onPrint(key)}
                className="flex items-center justify-center gap-2 w-full py-2.5 text-sm font-bold text-[#1F2421] border-2 border-[#1F2421]"
              >
                <Icon name="file" size={15} /> Aperçu &amp; PDF à envoyer
              </button>
              {emails ? (
                <>
                  <p className="text-xs text-[#5B5A50] mb-2">Destinataire(s) : {emails}</p>
                  <a
                    href={mailtoHref}
                    className="flex items-center justify-center gap-2 w-full py-2.5 text-sm font-medium text-white mb-2"
                    style={{ backgroundColor: "#2F4F3E" }}
                  >
                    <Icon name="mail" size={15} /> Ouvrir dans l'app Mail
                  </a>
                  <button
                    onClick={copyMessage}
                    className="flex items-center justify-center gap-2 w-full py-2.5 text-sm font-bold text-[#1F2421] border-2 border-[#1F2421]"
                  >
                    {copiedKey === key ? <><Icon name="check" size={15} /> Message copié !</> : <><Icon name="mail" size={15} /> Copier le message (solution fiable)</>}
                  </button>
                  <p className="text-[11px] text-[#5B5A50] mt-1.5 text-center">
                    Si "Ouvrir dans l'app Mail" ne fait rien sur ton appareil, copie le message et colle-le dans un nouveau mail adressé à {emails}.
                  </p>
                  {copiedKey === "error-" + key && (
                    <p className="text-[11px] text-[#8B3A2B] mt-1 text-center">
                      La copie automatique n'a pas fonctionné. Sélectionne et copie le texte ci-dessus manuellement.
                    </p>
                  )}
                </>
              ) : (
                <p className="text-xs text-[#5B5A50] text-center">
                  Aucun email renseigné pour ce fournisseur — ajoute-en un dans l'onglet Fournisseurs pour préparer l'envoi.
                </p>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function OrderPrintPage({ supplier, items, restaurantName, onSetRestaurantName, onClose }) {
  const [showPrices, setShowPrices] = useState(true);
  const total = items.reduce((s, p) => s + Number(p._stockEquiv) * Number(p._price), 0);
  const today = new Date().toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });

  return (
    <div className="min-h-screen" style={{ backgroundColor: "#F5F2EC" }}>
      <style>{`
        @media print {
          .no-print { display: none !important; }
          body { background: white !important; }
          .print-doc { border: none !important; box-shadow: none !important; }
        }
      `}</style>

      <div className="no-print sticky top-0 z-10 flex items-center justify-between gap-2 px-4 py-3 text-white flex-wrap" style={{ backgroundColor: "#1F2421" }}>
        <button onClick={onClose} className="flex items-center gap-1.5 text-sm"><Icon name="x" size={18} /> Fermer</button>
        <label className="flex items-center gap-2 text-sm">
          <input type="checkbox" checked={showPrices} onChange={(e) => setShowPrices(e.target.checked)} />
          Afficher les prix
        </label>
        <button
          onClick={() => window.print()}
          className="flex items-center gap-2 px-4 py-2 text-sm font-medium"
          style={{ backgroundColor: "#2F4F3E" }}
        >
          <Icon name="printer" size={16} /> Imprimer / Enregistrer en PDF
        </button>
      </div>

      <div className="max-w-2xl mx-auto p-6 sm:p-10">
        <div className="print-doc bg-white border border-[#1F2421]/15 p-8 sm:p-12" style={{ fontFamily: "'Newsreader', Georgia, serif" }}>
          <div className="flex items-start justify-between gap-4 mb-8">
            <div className="flex-1">
              <input
                value={restaurantName || ""}
                onChange={(e) => onSetRestaurantName(e.target.value)}
                placeholder="Nom de votre restaurant"
                className="text-xl font-medium w-full border-0 border-b border-transparent focus:border-[#1F2421]/30 focus:outline-none bg-transparent"
              />
              <div className="text-[11px] uppercase tracking-[0.2em] text-[#C98A2B] mt-1">Bon de commande</div>
            </div>
            <div className="text-sm text-[#5B5A50] text-right shrink-0 font-['IBM_Plex_Mono',monospace]">{today}</div>
          </div>

          <div className="mb-8 pb-6 border-b border-[#1F2421]/15">
            <div className="text-[10px] uppercase tracking-wide text-[#5B5A50] mb-1">Destinataire</div>
            <div className="text-lg font-medium">{supplier?.name || "Fournisseur"}</div>
            {supplier?.contact && <div className="text-sm text-[#5B5A50]">{supplier.contact}</div>}
            {supplier?.phone && <div className="text-sm text-[#5B5A50]">{supplier.phone}</div>}
            {(supplier?.email1 || supplier?.email2) && (
              <div className="text-sm text-[#5B5A50]">{[supplier?.email1, supplier?.email2].filter(Boolean).join(" · ")}</div>
            )}
          </div>

          <table className="w-full text-sm mb-6">
            <thead>
              <tr className="border-b-2 border-[#1F2421] text-left text-[10px] uppercase tracking-wide text-[#5B5A50]">
                <th className="py-2 font-normal">Article</th>
                <th className="py-2 font-normal">Réf.</th>
                <th className="py-2 font-normal text-right">Quantité</th>
                {showPrices && <th className="py-2 font-normal text-right">Prix unit.</th>}
                {showPrices && <th className="py-2 font-normal text-right">Total</th>}
              </tr>
            </thead>
            <tbody className="font-['IBM_Plex_Mono',monospace]">
              {items.map((p) => (
                <tr key={p.id} className="border-b border-[#1F2421]/10">
                  <td className="py-2.5 pr-2 font-['Newsreader',Georgia,serif]">
                    {p.name}
                    {p.packaging && <div className="text-[11px] text-[#5B5A50]">{p.packaging}</div>}
                  </td>
                  <td className="py-2.5 pr-2 text-[#5B5A50]">{p._ref || "—"}</td>
                  <td className="py-2.5 text-right whitespace-nowrap">{p._qty} {p._orderUnit.label}</td>
                  {showPrices && <td className="py-2.5 pl-4 text-right whitespace-nowrap">{Number(p._price).toFixed(2)} €</td>}
                  {showPrices && <td className="py-2.5 pl-4 text-right whitespace-nowrap">{(Number(p._stockEquiv) * Number(p._price)).toFixed(2)} €</td>}
                </tr>
              ))}
            </tbody>
          </table>

          {showPrices && (
            <div className="flex justify-end mb-10">
              <div className="text-right">
                <div className="text-[10px] uppercase tracking-wide text-[#5B5A50]">Total estimé</div>
                <div className="text-2xl font-medium font-['IBM_Plex_Mono',monospace]" style={{ color: "#2F4F3E" }}>{total.toFixed(2)} €</div>
              </div>
            </div>
          )}

          <p className="text-xs text-[#5B5A50] border-t border-[#1F2421]/15 pt-4">
            Merci de confirmer la réception de cette commande et le délai de livraison prévu.
          </p>
        </div>

        <p className="no-print text-xs text-[#5B5A50] text-center mt-4">
          Utilise le bouton "Imprimer / Enregistrer en PDF" puis choisis "Enregistrer au format PDF" comme imprimante pour obtenir un fichier à joindre à ton email.
        </p>
      </div>
    </div>
  );
}

function HistoryView({ orderHistory, orderBySupplier, suppliersById, onDelete, onMarkSent }) {
  const pendingKeys = Object.keys(orderBySupplier);
  const hasNothing = pendingKeys.length === 0 && orderHistory.length === 0;

  return (
    <div className="space-y-6">
      <h2 className="text-lg font-medium">Historique des commandes</h2>

      {hasNothing ? (
        <p className="text-sm text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">Aucune commande pour le moment.</p>
      ) : (
        <>
          {pendingKeys.length > 0 && (
            <div>
              <div className="text-[11px] uppercase tracking-wide text-[#5B5A50] mb-2">En attente d'envoi</div>
              <div className="space-y-2">
                {pendingKeys.map((key) => {
                  const items = orderBySupplier[key];
                  const total = items.reduce((s, p) => s + Number(p._stockEquiv) * Number(p._price), 0);
                  return (
                    <div key={key} className="bg-white border border-[#C98A2B] px-4 py-3 flex items-center justify-between gap-3">
                      <div className="min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] uppercase font-bold px-1.5 py-0.5 shrink-0" style={{ backgroundColor: "#C98A2B", color: "#1F2421" }}>À envoyer</span>
                          <span className="font-medium truncate">{suppliersById[key]?.name || "Sans fournisseur"}</span>
                        </div>
                        <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace] mt-0.5">{items.length} article(s) · ≈ {total.toFixed(2)} €</div>
                      </div>
                      <button
                        onClick={() => onMarkSent(key)}
                        className="text-xs px-2 py-1.5 border shrink-0"
                        style={{ borderColor: "#1F2421", color: "#1F2421" }}
                      >
                        Marquer envoyée
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {orderHistory.length > 0 && (
            <div>
              <div className="text-[11px] uppercase tracking-wide text-[#5B5A50] mb-2">Envoyées</div>
              <div className="space-y-2">
                {orderHistory.map((h) => (
                  <div key={h.id} className="bg-white border border-[#1F2421]/15 px-4 py-3">
                    <div className="flex items-center justify-between gap-3">
                      <div className="min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] uppercase font-bold px-1.5 py-0.5 text-white shrink-0" style={{ backgroundColor: "#2F4F3E" }}>Envoyée</span>
                          <span className="font-medium truncate">{h.supplierName}</span>
                        </div>
                        <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace] mt-0.5 capitalize">
                          {formatDate(h.date)} · {h.items.length} article(s) · ≈ {h.total.toFixed(2)} €
                        </div>
                      </div>
                      <button onClick={() => onDelete(h.id)} className="text-[#8B3A2B] p-1 shrink-0" aria-label="Supprimer"><Icon name="trash" size={15} /></button>
                    </div>
                    <details className="mt-2">
                      <summary className="text-xs text-[#2F4F3E] underline underline-offset-2 cursor-pointer">Voir le détail</summary>
                      <div className="mt-2 divide-y divide-[#1F2421]/10">
                        {h.items.map((it, i) => (
                          <div key={i} className="flex items-center justify-between py-1.5 text-sm">
                            <span>{it.name}{it.ref && <span className="text-xs text-[#5B5A50]"> · réf. {it.ref}</span>}</span>
                            <span className="font-['IBM_Plex_Mono',monospace] text-[#5B5A50]">{it.quantity} {it.unit}</span>
                          </div>
                        ))}
                      </div>
                    </details>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function FournisseursView({ suppliers, products, onEdit, onDelete, onAdd }) {
  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-medium">Fournisseurs</h2>
        <button onClick={onAdd} className="flex items-center gap-1.5 text-white text-sm px-3 py-2" style={{ backgroundColor: "#2F4F3E" }}>
          <Icon name="plus" size={15} /> Ajouter un fournisseur
        </button>
      </div>
      <div className="grid sm:grid-cols-2 gap-3">
        {suppliers.map((s) => {
          const count = products.filter((p) => (p.suppliers || []).some((x) => x.supplierId === s.id)).length;
          return (
            <div key={s.id} className="bg-white border border-[#1F2421]/15 px-4 py-3">
              <div className="flex items-start justify-between">
                <div>
                  <div className="font-medium">{s.name}</div>
                  <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace] mt-0.5">
                    {s.contact && <>{s.contact} · </>}{s.phone}
                  </div>
                  {(s.email1 || s.email2) && (
                    <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">
                      {[s.email1, s.email2].filter(Boolean).join(" · ")}
                    </div>
                  )}
                  <div className="text-[10px] uppercase tracking-wide text-[#5B5A50] mt-1">{count} produit(s)</div>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => onEdit(s)} className="text-xs text-[#2F4F3E] underline underline-offset-2">modifier</button>
                  <button onClick={() => onDelete(s.id)} className="text-[#8B3A2B] p-1"><Icon name="trash" size={15} /></button>
                </div>
              </div>
            </div>
          );
        })}
        {suppliers.length === 0 && <p className="text-sm text-[#5B5A50]">Aucun fournisseur. Ajoute-en un.</p>}
      </div>
    </div>
  );
}

function Page({ title, onCancel, onSave, saveLabel, children }) {
  return (
    <div className="border border-[#1F2421]/20" style={{ backgroundColor: "#FAF8F3" }}>
      <div className="flex items-center justify-between px-4 py-3 border-b border-[#1F2421]/15 gap-3">
        <h3 className="font-medium truncate">{title}</h3>
        <div className="flex items-center gap-2 shrink-0">
          {onSave && (
            <button
              onClick={onSave}
              className="flex items-center gap-1.5 px-3 py-2 text-sm font-bold text-[#1F2421] border-2 border-[#1F2421] underline underline-offset-2"
            >
              <Icon name="check" size={16} /> {saveLabel || "Enregistrer"}
            </button>
          )}
          <button onClick={onCancel} aria-label="Fermer" className="p-1"><Icon name="x" size={20} /></button>
        </div>
      </div>
      <div className="p-4">{children}</div>
    </div>
  );
}

function ProductPage({ product, suppliers, categories, zones, onAddCategory, onRemoveCategory, onAddZone, onRemoveZone, onSave, onCancel }) {
  const [form, setForm] = useState({ ...product, suppliers: product.suppliers?.length ? product.suppliers : [{ supplierId: "", price: 0, packPrice: "", ref: "" }] });
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const [newCategory, setNewCategory] = useState("");
  const [newZone, setNewZone] = useState("");

  const unitsPerOrder = Number(form.unitsPerOrder) > 0 ? Number(form.unitsPerOrder) : 1;

  const setSupplierRow = (i, key, value) => {
    const rows = form.suppliers.map((r, idx) => {
      if (idx !== i) return r;
      const next = { ...r, [key]: value };
      if (key === "packPrice") {
        next.price = Number(value) > 0 ? Number(value) / unitsPerOrder : 0;
      }
      return next;
    });
    setForm({ ...form, suppliers: rows });
  };

  // Quand le conditionnement change, recalcule le prix au kg/L de chaque fournisseur à partir du prix du colis
  const setUnitsPerOrder = (e) => {
    const nextUnits = Number(e.target.value) > 0 ? Number(e.target.value) : 1;
    const rows = form.suppliers.map((r) =>
      r.packPrice ? { ...r, price: Number(r.packPrice) / nextUnits } : r
    );
    setForm({ ...form, unitsPerOrder: e.target.value, suppliers: rows });
  };

  const addSupplierRow = () => setForm({ ...form, suppliers: [...form.suppliers, { supplierId: "", price: 0, packPrice: "", ref: "" }] });
  const removeSupplierRow = (i) => {
    const rows = form.suppliers.filter((_, idx) => idx !== i);
    const removed = form.suppliers[i];
    setForm({
      ...form,
      suppliers: rows,
      preferredSupplierId: form.preferredSupplierId === removed.supplierId ? "" : form.preferredSupplierId,
    });
  };

  return (
    <Page
      title={form.name ? "Modifier le produit" : "Nouveau produit"}
      onCancel={onCancel}
      onSave={() => {
        if (!form.name.trim()) return;
        const cleanSuppliers = form.suppliers.filter((r) => r.supplierId).map((r) => ({ supplierId: r.supplierId, price: Number(r.price) || 0, packPrice: r.packPrice || "", ref: (r.ref || "").trim() }));
        const preferredSupplierId = cleanSuppliers.some((r) => r.supplierId === form.preferredSupplierId)
          ? form.preferredSupplierId
          : (cleanSuppliers[0]?.supplierId || "");
        onSave({
          ...form,
          quantity: Number(form.quantity),
          unitsPerOrder: Number(form.unitsPerOrder) > 0 ? Number(form.unitsPerOrder) : 1,
          suppliers: cleanSuppliers,
          preferredSupplierId,
        });
      }}
    >
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div className="sm:col-span-2">
          <Field label="Nom">
            <input className={inputCls} value={form.name} onChange={set("name")} placeholder="Ex. Tomates" />
          </Field>
        </div>
        <Field label="Catégorie">
          <select className={inputCls} value={form.category} onChange={set("category")}>
            {categories.map((c) => <option key={c}>{c}</option>)}
          </select>
        </Field>
        <Field label="Zone">
          <select className={inputCls} value={form.zone || ""} onChange={set("zone")}>
            <option value="">—</option>
            {zones.map((z) => <option key={z}>{z}</option>)}
          </select>
        </Field>
        <Field label="Unité">
          <select className={inputCls} value={form.unit} onChange={set("unit")}>
            {UNITS.map((u) => <option key={u}>{u}</option>)}
          </select>
        </Field>
        <Field label="Quantité actuelle">
          <input type="number" step="0.1" className={inputCls} value={form.quantity} onChange={set("quantity")} />
        </Field>
        <div className="sm:col-span-2">
          <Field label="Conditionnement (description)">
            <input className={inputCls} value={form.packaging || ""} onChange={set("packaging")} placeholder="Ex. Carton de 6 x 1L, sac de 25 kg…" />
          </Field>
        </div>
        <Field label="Unité de commande">
          <input className={inputCls} value={form.orderUnit || ""} onChange={set("orderUnit")} placeholder="Ex. carton, sac, pièce" />
        </Field>
        <Field label={`Qté de ${form.unit} par unité de commande`}>
          <input type="number" step="0.1" className={inputCls} value={form.unitsPerOrder ?? 1} onChange={setUnitsPerOrder} />
        </Field>
      </div>

      <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <div className="text-[11px] uppercase tracking-wide text-[#5B5A50] mb-1">Catégories</div>
          <div className="flex flex-wrap gap-1.5 mb-2">
            {categories.map((c) => (
              <span key={c} className="flex items-center gap-1 text-xs border border-[#1F2421]/20 px-2 py-1">
                {c}
                <button type="button" onClick={() => onRemoveCategory(c)} className="text-[#8B3A2B]" aria-label={`Retirer ${c}`}>
                  <Icon name="x" size={11} />
                </button>
              </span>
            ))}
          </div>
          <div className="flex gap-2">
            <input className={inputCls} placeholder="Nouvelle catégorie" value={newCategory} onChange={(e) => setNewCategory(e.target.value)} />
            <button type="button" onClick={() => { onAddCategory(newCategory); setNewCategory(""); }} className="shrink-0 px-3 border border-[#1F2421]"><Icon name="plus" size={14} /></button>
          </div>
        </div>
        <div>
          <div className="text-[11px] uppercase tracking-wide text-[#5B5A50] mb-1">Zones</div>
          <div className="flex flex-wrap gap-1.5 mb-2">
            {zones.map((z) => (
              <span key={z} className="flex items-center gap-1 text-xs border border-[#1F2421]/20 px-2 py-1">
                {z}
                <button type="button" onClick={() => onRemoveZone(z)} className="text-[#8B3A2B]" aria-label={`Retirer ${z}`}>
                  <Icon name="x" size={11} />
                </button>
              </span>
            ))}
          </div>
          <div className="flex gap-2">
            <input className={inputCls} placeholder="Nouvelle zone" value={newZone} onChange={(e) => setNewZone(e.target.value)} />
            <button type="button" onClick={() => { onAddZone(newZone); setNewZone(""); }} className="shrink-0 px-3 border border-[#1F2421]"><Icon name="plus" size={14} /></button>
          </div>
        </div>
      </div>

      <div className="mt-4">
        <div className="text-[11px] uppercase tracking-wide text-[#5B5A50] mb-2">Fournisseurs &amp; prix</div>
        <div className="space-y-2">
          {form.suppliers.map((row, i) => (
            <div key={i} className="flex flex-wrap items-end gap-2">
              <button
                type="button"
                onClick={() => setForm({ ...form, preferredSupplierId: row.supplierId })}
                disabled={!row.supplierId}
                aria-label="Fournisseur préféré"
                className="shrink-0 text-lg self-center"
                style={{ color: row.supplierId && form.preferredSupplierId === row.supplierId ? "#C98A2B" : "#1F2421", opacity: row.supplierId ? 1 : 0.3 }}
              >
                {row.supplierId && form.preferredSupplierId === row.supplierId ? "★" : "☆"}
              </button>
              <select className={`${inputCls} w-auto flex-1 min-w-[110px]`} value={row.supplierId} onChange={(e) => setSupplierRow(i, "supplierId", e.target.value)}>
                <option value="">Choisir…</option>
                {suppliers.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
              <div className="flex flex-col gap-1">
                <span className="text-[10px] uppercase tracking-wide text-[#5B5A50]">
                  Prix {unitsPerOrder > 1 ? `du ${form.orderUnit || "colis"}` : `au ${form.unit}`} (€)
                </span>
                <input
                  type="number" step="0.01" placeholder="0.00"
                  className={`${inputCls} max-w-[90px]`}
                  value={row.packPrice ?? (unitsPerOrder > 1 ? "" : row.price)}
                  onChange={(e) => unitsPerOrder > 1 ? setSupplierRow(i, "packPrice", e.target.value) : setSupplierRow(i, "price", e.target.value)}
                />
              </div>
              {unitsPerOrder > 1 && (
                <div className="flex flex-col gap-1">
                  <span className="text-[10px] uppercase tracking-wide text-[#5B5A50]">Prix au {form.unit} (auto)</span>
                  <div className={`${inputCls} max-w-[90px] flex items-center bg-[#F5F2EC] text-[#5B5A50]`}>
                    {Number(row.price) > 0 ? Number(row.price).toFixed(2) : "—"}
                  </div>
                </div>
              )}
              <input
                type="text" placeholder="Réf. fournisseur"
                className={`${inputCls} max-w-[130px]`}
                value={row.ref || ""}
                onChange={(e) => setSupplierRow(i, "ref", e.target.value)}
              />
              <button type="button" onClick={() => removeSupplierRow(i)} className="shrink-0 text-[#8B3A2B] p-1">
                <Icon name="trash" size={15} />
              </button>
            </div>
          ))}
        </div>
        <button type="button" onClick={addSupplierRow} className="mt-2 flex items-center gap-1 text-xs text-[#2F4F3E] underline underline-offset-2">
          <Icon name="plus" size={13} /> Ajouter un fournisseur
        </button>
        <p className="text-[11px] text-[#5B5A50] mt-1">Touche l'étoile pour définir le fournisseur préféré.</p>
      </div>

      <div className="mt-5 pt-4 border-t border-[#1F2421]/15">
        <button onClick={onCancel} className="w-full py-2.5 text-sm text-[#5B5A50] underline underline-offset-2">Annuler</button>
      </div>
      {!form.name.trim() && <p className="text-xs text-[#C98A2B] mt-2 text-center">Le nom du produit est requis.</p>}
    </Page>
  );
}

function SupplierPage({ supplier, onSave, onCancel }) {
  const [form, setForm] = useState(supplier);
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  return (
    <Page
      title={form.name ? "Modifier le fournisseur" : "Nouveau fournisseur"}
      onCancel={onCancel}
      onSave={() => {
        if (!form.name.trim()) return;
        onSave(form);
      }}
    >
      <div className="grid gap-3">
        <Field label="Nom">
          <input className={inputCls} value={form.name} onChange={set("name")} placeholder="Ex. Primeurs du Marché" />
        </Field>
        <Field label="Contact">
          <input className={inputCls} value={form.contact} onChange={set("contact")} placeholder="Nom du contact" />
        </Field>
        <Field label="Téléphone">
          <input className={inputCls} value={form.phone} onChange={set("phone")} placeholder="06 XX XX XX XX" />
        </Field>
        <Field label="Email 1 (pour les commandes)">
          <input type="email" className={inputCls} value={form.email1 || ""} onChange={set("email1")} placeholder="commandes@fournisseur.fr" />
        </Field>
        <Field label="Email 2 (optionnel)">
          <input type="email" className={inputCls} value={form.email2 || ""} onChange={set("email2")} placeholder="autre@fournisseur.fr" />
        </Field>
      </div>
      <div className="mt-5 pt-4 border-t border-[#1F2421]/15">
        <button onClick={onCancel} className="w-full py-2.5 text-sm text-[#5B5A50] underline underline-offset-2">Annuler</button>
      </div>
      {!form.name.trim() && <p className="text-xs text-[#C98A2B] mt-2 text-center">Le nom du fournisseur est requis.</p>}
    </Page>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
