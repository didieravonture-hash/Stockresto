    { id: uid(), name: "Filet de bœuf", category: "Viandes", unit: "kg", packaging: "Pièce entière ~2,5 kg", orderUnit: "pièce", unitsPerOrder: 2.5, quantity: 3, suppliers: [{ supplierId: "s2", price: 28, packPrice: "70", ref: "BOV-FIL-01" }, { supplierId: "s3", price: 29.5, packPrice: "73.75", ref: "" }], preferredSupplierId: "s2" },

  logoUrl: "",
});

function useStore() {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState("loading");
  const [loadError, setLoadError] = useState("");

  const headers = {
    "apikey": SUPABASE_ANON_KEY,
    "Content-Type": "application/json",
  };

  useEffect(() => {
    (async () => {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.resto&select=data`, { headers });
        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`Connexion Supabase impossible (${res.status}) : ${errText}`);
        }
        const rows = await res.json();
        const stored = rows && rows[0] && rows[0].data;
        if (stored && Object.keys(stored).length > 0) {
          const parsed = stored;
          if (!parsed.pendingOrders) parsed.pendingOrders = [];
          if (!parsed.inventories) parsed.inventories = [];
          if (parsed.restaurantName === undefined) parsed.restaurantName = "";
          if (!parsed.orderHistory) parsed.orderHistory = [];
          if (!parsed.categories || !parsed.categories.length) parsed.categories = [...DEFAULT_CATEGORIES];
          if (!parsed.zones || !parsed.zones.length) parsed.zones = [...DEFAULT_ZONES];
          if (!parsed.deliveryDates) parsed.deliveryDates = {};
          if (parsed.accessCode === undefined) parsed.accessCode = "";
          if (parsed.inventoryDraft === undefined) parsed.inventoryDraft = null;
          if (parsed.logoUrl === undefined) parsed.logoUrl = "";
          setData(parsed);
        } else setData(seedData());
        setStatus("ready");
      } catch (e) {
        setStatus("error");
        setLoadError(e.message || String(e));
      }
    })();
  }, []);

  const save = async (next) => {
    setData(next);
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.resto`, {
        method: "PATCH",
        headers,
        body: JSON.stringify({ data: next }),
      });
      if (!res.ok) {
        const errText = await res.text();
        console.error("Erreur de sauvegarde Supabase :", res.status, errText);
      }
    } catch (e) {
      console.error("Erreur de sauvegarde :", e);
    }
  };

  return { data, save, status, loadError };
}

function Field({ label, children }) {
  return (
    <label className="flex flex-col gap-1 text-[11px] uppercase tracking-wide text-[#5B5A50]">

function QuantityStepper({ value, onChange, step = 1, disabled = false }) {
  const num = Number(value) || 0;
  const round = (n) => Math.round(n * 100) / 100;
  return (
    <div className="flex items-center gap-1.5">
      <button
        type="button"
        disabled={disabled}
        onClick={() => onChange(String(Math.max(0, round(num - step))))}
        className="w-8 h-8 shrink-0 border border-[#1F2421]/20 rounded-lg hover:bg-[#F5F2EC] active:scale-90 transition-all duration-150 disabled:opacity-40"
      >−</button>
      <input
        type="number"
        disabled={disabled}
        className={inputCls + " text-center"}
        value={value}
        onChange={(e) => onChange(e.target.value)}
      />
      <button
        type="button"
        disabled={disabled}
        onClick={() => onChange(String(round(num + step)))}
        className="w-8 h-8 shrink-0 border border-[#1F2421]/20 rounded-lg hover:bg-[#F5F2EC] active:scale-90 transition-all duration-150 disabled:opacity-40"
      >+</button>
    </div>
  );
}

const inputCls = "w-full bg-white border border-[#1F2421]/20 rounded-lg px-2.5 py-1.5 text-sm text-[#1F2421] focus:outline-none focus:ring-2 focus:ring-[#2F4F3E] focus:border-transparent transition-all duration-150 font-['IBM_Plex_Mono',monospace] box-border";

function App() {
  const { data, save, status, loadError } = useStore();
  const [tab, setTab] = useState("dashboard");
  const [unlockedTabs, setUnlockedTabs] = useState(false);
  const [editingProduct, setEditingProduct] = useState(null);
  const [editingSupplier, setEditingSupplier] = useState(null);
  const [inInventory, setInInventory] = useState(false);
  const [inventoryCategoryFilter, setInventoryCategoryFilter] = useState("");

  const inventoryDraft = data?.inventoryDraft || null;

  // Démarre un inventaire : reprend le brouillon en cours s'il existe, sinon démarre avec la catégorie choisie
  const startInventory = (cat) => {
    setInventoryCategoryFilter(inventoryDraft ? (inventoryDraft.categoryFilter || "") : (cat || ""));
    setInInventory(true);
  };
  const saveInventoryDraft = (draft) => save({ ...data, inventoryDraft: draft });
  const discardInventoryDraft = () => confirmAndRun(() => save({ ...data, inventoryDraft: null }));
  const [printingKey, setPrintingKey] = useState(null);
  const [checkingRecord, setCheckingRecord] = useState(null);

  const suppliersById = useMemo(() => {
    if (!data) return {};
    return Object.fromEntries(data.suppliers.map((s) => [s.id, s]));
  }, [data]);

  const pendingOrders = data?.pendingOrders || [];
  const inventories = data?.inventories || [];
  const orderHistory = data?.orderHistory || [];

  const orderBySupplier = useMemo(() => {
    if (!data) return {};
    const groups = {};
    pendingOrders.forEach((order) => {
      const p = data.products.find((x) => x.id === order.productId);
      if (!p) return;
      const pref = getPreferred(p);
      const orderUnit = getOrderUnit(p);
      const key = pref?.supplierId || "none";
      const qty = Number(order.quantity) || 0;
      if (!groups[key]) groups[key] = [];
      groups[key].push({ ...p, _price: pref?.price || 0, _ref: pref?.ref || "", _qty: qty, _orderUnit: orderUnit, _stockEquiv: qty * orderUnit.size });
    });
    return groups;
  }, [data, pendingOrders]);

  const totalOrderCount = pendingOrders.length;

  if (status === "error") {
    return (
      <div className="min-h-screen flex items-center justify-center p-6" style={{ backgroundColor: "#F5F2EC" }}>
        <div className="max-w-md text-center">
          <p className="font-medium text-[#8B3A2B] mb-2">Impossible de charger les données</p>
          <p className="text-sm text-[#5B5A50] font-['IBM_Plex_Mono',monospace] whitespace-pre-wrap">{loadError}</p>
        </div>
      </div>
    );
  }

  if (status === "loading" || !data) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ backgroundColor: "#F5F2EC" }}>
        <Icon name="loader" className="animate-spin text-[#2F4F3E]" size={28} />
      </div>
    );
  }

  const updateProduct = (p) => {
    const exists = data.products.some((x) => x.id === p.id);
    const products = exists ? data.products.map((x) => (x.id === p.id ? p : x)) : [...data.products, p];
    save({ ...data, products });
    setEditingProduct(null);
  };

  // Demande le code de suppression avant d'exécuter une action sensible
  const confirmAndRun = (action) => {
    const code = data.deleteCode || "";
    if (!code) { action(); return; }
    const entered = window.prompt("Code requis pour supprimer :");
    if (entered === null) return;
    if (entered === code) action();
    else window.alert("Code incorrect, suppression annulée.");
  };
  const setDeleteCode = (code) => save({ ...data, deleteCode: code });
  const setAccessCode = (code) => save({ ...data, accessCode: code });
  const setLogo = (dataUrl) => save({ ...data, logoUrl: dataUrl });

  const deleteProduct = (id) => confirmAndRun(() =>
    save({ ...data, products: data.products.filter((p) => p.id !== id), pendingOrders: pendingOrders.filter((o) => o.productId !== id) })
  );

  const updateSupplier = (s) => {
    const exists = data.suppliers.some((x) => x.id === s.id);
    const suppliers = exists ? data.suppliers.map((x) => (x.id === s.id ? s : x)) : [...data.suppliers, s];
    save({ ...data, suppliers });
    setEditingSupplier(null);
  };
  const deleteSupplier = (id) => confirmAndRun(() =>
    save({ ...data, suppliers: data.suppliers.filter((s) => s.id !== id) })
  );

  const adjustQty = (id, delta) => {
    save({
      ...data,
      products: data.products.map((p) =>
        p.id === id ? { ...p, quantity: Math.max(0, Math.round((Number(p.quantity) + delta) * 100) / 100) } : p
      ),
    });
  };

  const resetAllStock = () => confirmAndRun(() =>
    save({ ...data, products: data.products.map((p) => ({ ...p, quantity: 0 })) })
  );

  // Applique une modification (catégorie ou zone) à tous les produits correspondant au filtre choisi
  const bulkUpdateProducts = ({ filterCategory, filterZone, field, value }) => {
    confirmAndRun(() =>
      save({
        ...data,
        products: data.products.map((p) => {
          if (filterCategory && p.category !== filterCategory) return p;
          if (filterZone && p.zone !== filterZone) return p;
          return { ...p, [field]: value };
        }),
      })
    );
  };

  // Ajoute ou met à jour la quantité commandée pour un produit
  const setOrderQuantity = (productId, quantity) => {
    const exists = pendingOrders.some((o) => o.productId === productId);
    const next = exists
      ? pendingOrders.map((o) => (o.productId === productId ? { ...o, quantity } : o))
      : [...pendingOrders, { productId, quantity }];
    save({ ...data, pendingOrders: next });
  };
  const removeOrder = (productId) => save({ ...data, pendingOrders: pendingOrders.filter((o) => o.productId !== productId) });

  // Termine un inventaire : met à jour les stocks comptés, ajoute les commandes choisies, garde une trace dans l'historique
  const finishInventory = ({ counts, orders }) => {
    const products = data.products.map((p) =>
      counts[p.id] !== undefined ? { ...p, quantity: Number(counts[p.id]) || 0 } : p
    );

    let nextOrders = [...pendingOrders];
    Object.entries(orders).forEach(([productId, qty]) => {
      const n = Number(qty);
      const exists = nextOrders.some((o) => o.productId === productId);
      if (n > 0) {
        nextOrders = exists
          ? nextOrders.map((o) => (o.productId === productId ? { ...o, quantity: n } : o))
          : [...nextOrders, { productId, quantity: n }];
      } else if (exists) {
        nextOrders = nextOrders.filter((o) => o.productId !== productId);
      }
    });

    const record = {
      id: uid(),
      date: new Date().toISOString(),
      items: Object.keys(counts).map((pid) => {
        const prod = data.products.find((p) => p.id === pid);
        return { productId: pid, name: prod?.name || "", quantity: Number(counts[pid]) || 0 };
      }),
    };

    save({ ...data, products, pendingOrders: nextOrders, inventories: [record, ...inventories], inventoryDraft: null });
    setInInventory(false);
    setInventoryCategoryFilter("");
    setTab(Object.keys(orders).some((k) => Number(orders[k]) > 0) ? "commandes" : "stock");
  };

  const deleteInventory = (id) => confirmAndRun(() => save({ ...data, inventories: inventories.filter((i) => i.id !== id) }));

  // Archive le bon de commande d'un fournisseur comme envoyé, et le retire des commandes en attente
  const markOrderSent = (supplierKey) => {
    const items = orderBySupplier[supplierKey] || [];
    if (items.length === 0) return;
    const supplier = suppliersById[supplierKey];
    const record = {
      id: uid(),
      date: new Date().toISOString(),
      supplierId: supplierKey,
      supplierName: supplier?.name || "Sans fournisseur",
      items: items.map((p) => ({ productId: p.id, name: p.name, ref: p._ref, quantity: p._qty, unit: p._orderUnit.label, stockUnit: p.unit, price: p._price, stockEquiv: p._stockEquiv })),
      total: items.reduce((s, p) => s + Number(p._stockEquiv) * Number(p._price), 0),
      sent: true,
    };
    const productIds = new Set(items.map((p) => p.id));
    save({
      ...data,
      pendingOrders: pendingOrders.filter((o) => !productIds.has(o.productId)),
      orderHistory: [record, ...orderHistory],
    });
  };

  const deleteHistoryEntry = (id) => confirmAndRun(() => save({ ...data, orderHistory: orderHistory.filter((h) => h.id !== id) }));

  // Enregistre la réception d'une commande : ajoute les quantités reçues au stock et note les écarts
  const validateReception = (recordOrId, receivedQtys, manualItems) => {
    const isManual = typeof recordOrId !== "string";
    const record = isManual ? { ...recordOrId, items: manualItems } : orderHistory.find((h) => h.id === recordOrId);
    if (!record || record.items.length === 0) return;

    let products = data.products;
    record.items.forEach((it, i) => {
      const receivedOrderQty = Number(receivedQtys[i]) || 0;
      const ratio = Number(it.quantity) > 0 ? Number(it.stockEquiv) / Number(it.quantity) : 1;
      const receivedStockQty = receivedOrderQty * ratio;
      if (it.productId && receivedStockQty > 0) {
        products = products.map((p) =>
          p.id === it.productId
            ? { ...p, quantity: Math.round((Number(p.quantity) + receivedStockQty) * 100) / 100 }
            : p
        );
      }
    });

    const receivedRecord = {
      receivedAt: new Date().toISOString(),
      items: record.items.map((it, i) => ({
        ordered: Number(it.quantity),
        received: Number(receivedQtys[i]) || 0,
      })),
    };

    const total = record.items.reduce((s, it, i) => s + (Number(receivedQtys[i]) || 0) * Number(it.price || 0), 0);
    const finalRecord = { ...record, total, received: receivedRecord };
    const nextHistory = isManual
      ? [finalRecord, ...orderHistory]
      : orderHistory.map((h) => (h.id === record.id ? finalRecord : h));

    save({ ...data, products, orderHistory: nextHistory });
    return finalRecord;
  };

  // Démarre un contrôle de réception libre, sans bon de commande préalable
  const startManualCheck = () => ({
    id: uid(),
    date: new Date().toISOString(),
    supplierId: "",
    supplierName: "",
    items: [],
    total: 0,
    sent: false,
    manual: true,
  });

  const addCategory = (name) => {
    const n = name.trim();
    if (!n || data.categories.includes(n)) return;
    save({ ...data, categories: [...data.categories, n] });
  };
  const removeCategory = (name) => confirmAndRun(() => save({ ...data, categories: data.categories.filter((c) => c !== name) }));

  const addZone = (name) => {
    const n = name.trim();
    if (!n || data.zones.includes(n)) return;
    save({ ...data, zones: [...data.zones, n] });
  };
  const removeZone = (name) => confirmAndRun(() => save({ ...data, zones: data.zones.filter((z) => z !== name) }));

  const setDeliveryDate = (supplierKey, dateStr) =>
    save({ ...data, deliveryDates: { ...data.deliveryDates, [supplierKey]: dateStr } });

  const NAV = [
    { id: "dashboard", label: "Tableau de bord", icon: "grid" },
    { id: "stock", label: "Stock", icon: "package" },
    { id: "inventaires", label: "Inventaires", icon: "clipboardCheck" },
    { id: "commandes", label: "Commandes", icon: "clipboard" },
    { id: "historique", label: "Historique", icon: "history" },
    { id: "fournisseurs", label: "Fournisseurs", icon: "truck" },
  ];

  return (
    <div className="min-h-screen text-[#1F2421]" style={{ fontFamily: "'Newsreader', Georgia, serif", backgroundColor: "#F5F2EC" }}>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
        @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadein { animation: fadein 0.35s ease-out; }
        ::selection { background: #C98A2B; color: #1F2421; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
      `}</style>

      <header className="text-white px-5 py-4 sm:px-8" style={{ background: "linear-gradient(135deg, #1F2421 0%, #2a2f2b 100%)" }}>
        <div className="max-w-5xl mx-auto flex items-center justify-between gap-4">
          <div>
            <div className="text-[10px] uppercase tracking-[0.2em] text-[#C98A2B] font-['IBM_Plex_Mono',monospace]">Restachat</div>
            <h1 className="text-2xl sm:text-3xl font-medium">Stocks &amp; Achats</h1>
            <div className="text-xs text-white/60 mt-0.5">par Avedi</div>
          </div>
          <div className="flex flex-col items-end gap-2 shrink-0">
            {data.logoUrl && (
              <img src={data.logoUrl} alt="Logo" className="h-16 max-w-[180px] w-auto rounded-lg object-contain" />

            {totalOrderCount > 0 && (
              <div className="flex items-center gap-2 text-[#C98A2B] text-sm font-['IBM_Plex_Mono',monospace]">
                <Icon name="clipboard" size={16} />
                {totalOrderCount} en commande
              </div>
            )}
          </div>
        </div>
      </header>

      {editingProduct ? (
        <main className="max-w-5xl mx-auto p-5 sm:p-8 animate-fadein">
          <ProductPage
            product={editingProduct}
            suppliers={data.suppliers}
            categories={data.categories}
            zones={data.zones}
            onAddCategory={addCategory}
            onRemoveCategory={removeCategory}
            onAddZone={addZone}
            onRemoveZone={removeZone}
            onSave={updateProduct}
            onCancel={() => setEditingProduct(null)}
          />
        </main>
      ) : editingSupplier ? (
        <main className="max-w-5xl mx-auto p-5 sm:p-8 animate-fadein">
          <SupplierPage
            supplier={editingSupplier}
            onSave={updateSupplier}
            onCancel={() => setEditingSupplier(null)}
          />
        </main>
      ) : inInventory ? (
        <main className="max-w-5xl mx-auto p-5 sm:p-8 animate-fadein">
          <InventoryPage
            products={inventoryCategoryFilter ? data.products.filter((p) => p.category === inventoryCategoryFilter) : data.products}
            categoryFilter={inventoryCategoryFilter}
            suppliersById={suppliersById}
            pendingOrders={pendingOrders}
            draft={inventoryDraft}
            onDraftChange={saveInventoryDraft}
            onCancel={() => { setInInventory(false); setInventoryCategoryFilter(""); }}
            onFinish={finishInventory}
          />

      ) : printingKey ? (
        <OrderPrintPage
          supplier={suppliersById[printingKey]}
          items={orderBySupplier[printingKey] || []}
          restaurantName={data.restaurantName}

          deliveryDate={data.deliveryDates[printingKey] || ""}

          onClose={() => setPrintingKey(null)}
        />
      ) : checkingRecord ? (
        <InvoiceCheckPage
          record={checkingRecord}
          products={data.products}
          suppliers={data.suppliers}
          restaurantName={data.restaurantName}
          savedInHistory={orderHistory.some((h) => h.id === checkingRecord.id)}
          onClose={() => setCheckingRecord(null)}
          onValidateReception={(qtys, items, meta) => {
            const isSaved = orderHistory.some((h) => h.id === checkingRecord.id);
            const base = isSaved ? checkingRecord.id : { ...checkingRecord, ...(meta || {}) };
            const result = validateReception(base, qtys, items);
            if (result) setCheckingRecord(result);
          }}
        />
      ) : (
        <>
          <nav className="text-white sticky top-0 z-10 shadow-sm" style={{ backgroundColor: "#2F4F3E" }}>
            <div className="max-w-5xl mx-auto flex overflow-x-auto">
              {NAV.map(({ id, label, icon }) => (
                <button
                  key={id}
                  onClick={() => setTab(id)}
                  style={{ backgroundColor: tab === id ? "#28402F" : "transparent" }}
                  className={`flex items-center gap-2 px-4 sm:px-5 py-3 text-sm whitespace-nowrap border-b-2 transition-all duration-200 hover:bg-black/10 ${
                    tab === id ? "border-[#C98A2B]" : "border-transparent"
                  }`}
                >
                  <Icon name={icon} size={15} /> {label}
                  {id === "commandes" && totalOrderCount > 0 && (
                    <span className="text-[#1F2421] text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center animate-pulse" style={{ backgroundColor: "#C98A2B" }}>
                      {totalOrderCount}
                    </span>
                  )}
                </button>
              ))}
            </div>
          </nav>

          <main className="max-w-5xl mx-auto p-5 sm:p-8 animate-fadein">
            {(tab === "stock" || tab === "fournisseurs") && data.accessCode && !unlockedTabs ? (
              <LockScreen accessCode={data.accessCode} onUnlock={() => setUnlockedTabs(true)} />
            ) : (
              <>
            {tab === "dashboard" && (
              <Dashboard data={data} orderBySupplier={orderBySupplier} suppliersById={suppliersById} setTab={setTab} onStartInventory={startInventory} inventoryDraft={inventoryDraft} onDiscardDraft={discardInventoryDraft} />
            )}

            {tab === "stock" && (
              <StockView
                products={data.products}
                categories={data.categories}
                zones={data.zones}
                suppliersById={suppliersById}
                onEdit={setEditingProduct}
                onAdjust={adjustQty}
                onDelete={deleteProduct}
                onAdd={() => setEditingProduct(emptyProduct(data.categories))}
                pendingOrders={pendingOrders}
                onSetOrderQuantity={setOrderQuantity}
                onRemoveOrder={removeOrder}
                onResetAll={resetAllStock}
                onBulkUpdate={bulkUpdateProducts}
              />
            )}

            {tab === "inventaires" && (
              <InventoriesView inventories={inventories} categories={data.categories} onStart={startInventory} onDelete={deleteInventory} inventoryDraft={inventoryDraft} onDiscardDraft={discardInventoryDraft} />
            )}

            {tab === "commandes" && (
              <CommandesView orderBySupplier={orderBySupplier} suppliersById={suppliersById} onRemoveOrder={removeOrder} onPrint={setPrintingKey} onMarkSent={markOrderSent} restaurantName={data.restaurantName} deliveryDates={data.deliveryDates} onSetDeliveryDate={setDeliveryDate} />
            )}

            {tab === "historique" && (
              <HistoryView orderHistory={orderHistory} orderBySupplier={orderBySupplier} suppliersById={suppliersById} onDelete={deleteHistoryEntry} onMarkSent={markOrderSent} onCheckInvoice={setCheckingRecord} onStartManualCheck={() => setCheckingRecord(startManualCheck())} />
            )}

            {tab === "fournisseurs" && (
              <FournisseursView
                suppliers={data.suppliers}
                products={data.products}
                onEdit={setEditingSupplier}
                onDelete={deleteSupplier}
                onAdd={() => setEditingSupplier(emptySupplier())}
                deleteCode={data.deleteCode || ""}
                onSetDeleteCode={setDeleteCode}
                accessCode={data.accessCode || ""}
                onSetAccessCode={setAccessCode}
                logoUrl={data.logoUrl || ""}
                onSetLogo={setLogo}
              />
            )}
              </>
            )}
          </main>
        </>
      )}
    </div>
  );
}

function LockScreen({ accessCode, onUnlock }) {
  const [value, setValue] = useState("");
  const [error, setError] = useState(false);

  const check = (v) => {
    if (v === accessCode) {
      onUnlock();
    } else {
      setError(true);
      setTimeout(() => setValue(""), 300);
    }
  };

  const press = (digit) => {
    setError(false);
    const next = value + digit;
    setValue(next);
    if (next.length >= accessCode.length) check(next);
  };
  const backspace = () => { setError(false); setValue((v) => v.slice(0, -1)); };
  const clear = () => { setError(false); setValue(""); };

  return (
    <div className="max-w-xs mx-auto text-center py-10">
      <div className="text-3xl mb-3">🔒</div>
      <h2 className="text-lg font-medium mb-1">Accès protégé</h2>
      <p className="text-sm text-[#5B5A50] mb-4">Entre le code pour accéder à cette section.</p>

      <div className="flex items-center justify-center gap-3 mb-6 h-8">
        {Array.from({ length: Math.max(value.length, accessCode.length || 4) }).map((_, i) => (
          <div
            key={i}
            className={`w-3.5 h-3.5 rounded-full border-2 transition-colors duration-150 ${i < value.length ? "" : "bg-transparent"}`}
            style={{
              borderColor: error ? "#8B3A2B" : "#1F2421",
              backgroundColor: i < value.length ? (error ? "#8B3A2B" : "#1F2421") : "transparent",
            }}
          />
        ))}
      </div>
      {error && <p className="text-xs text-[#8B3A2B] mb-3 -mt-3">Code incorrect.</p>}

      <div className="grid grid-cols-3 gap-3 max-w-[240px] mx-auto">
        {["1", "2", "3", "4", "5", "6", "7", "8", "9"].map((d) => (
          <button
            key={d}
            type="button"
            onClick={() => press(d)}
            className="aspect-square rounded-xl border border-[#1F2421]/20 text-xl font-medium bg-white hover:bg-[#F5F2EC] active:scale-90 transition-all duration-150"
          >
            {d}
          </button>
        ))}
        <button
          type="button"
          onClick={clear}
          className="aspect-square rounded-xl text-xs text-[#5B5A50] hover:bg-[#F5F2EC] active:scale-90 transition-all duration-150"
        >
          Effacer
        </button>
        <button
          type="button"
          onClick={() => press("0")}
          className="aspect-square rounded-xl border border-[#1F2421]/20 text-xl font-medium bg-white hover:bg-[#F5F2EC] active:scale-90 transition-all duration-150"
        >
          0
        </button>
        <button
          type="button"
          onClick={backspace}
          className="aspect-square rounded-xl text-lg text-[#5B5A50] hover:bg-[#F5F2EC] active:scale-90 transition-all duration-150"
        >
          ⌫
        </button>
      </div>
    </div>
  );
}

function Dashboard({ data, orderBySupplier, suppliersById, setTab, onStartInventory, inventoryDraft, onDiscardDraft }) {
  const totalValue = data.products.reduce((sum, p) => sum + Number(p.quantity) * Number(getPreferred(p)?.price || 0), 0);
  const pendingItems = Object.values(orderBySupplier).flat();
  const pendingTotal = pendingItems.reduce((s, p) => s + Number(p._stockEquiv) * Number(p._price), 0);
  const [invCategory, setInvCategory] = useState("");

  return (
    <div className="space-y-6">
      {inventoryDraft && (
        <div className="flex items-center justify-between gap-3 px-4 py-3 rounded-xl border" style={{ borderColor: "#C98A2B", backgroundColor: "#FBF3E4" }}>
          <div className="text-sm">
            <span className="font-medium">Inventaire en cours</span>
            {inventoryDraft.categoryFilter && <span className="text-[#5B5A50]"> — {inventoryDraft.categoryFilter}</span>}
            <span className="block text-xs text-[#5B5A50]">Non terminé, reprends où tu t'es arrêté.</span>
          </div>
          <div className="flex items-center gap-2 shrink-0">
            <button onClick={() => onStartInventory()} className="text-xs px-2.5 py-1.5 rounded-lg text-white" style={{ backgroundColor: "#C98A2B" }}>Reprendre</button>
            <button onClick={onDiscardDraft} className="text-xs text-[#8B3A2B] underline underline-offset-2">Abandonner</button>

      )}
      <div className="flex flex-wrap gap-2">
        <select className={`${inputCls} w-auto flex-1`} value={invCategory} onChange={(e) => setInvCategory(e.target.value)}>
          <option value="">Tous les produits</option>
          {data.categories.map((c) => <option key={c} value={c}>{c}</option>)}
        </select>
        <button
          onClick={() => onStartInventory(invCategory)}

          style={{ backgroundColor: "#2F4F3E" }}

      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
        <StatCard label="Références en stock" value={data.products.length} />

        <StatCard label="Fournisseurs" value={data.suppliers.length} />

      <div>
        <h2 className="text-lg font-medium mb-3 flex items-center gap-2">
          <Icon name="clipboard" size={18} className="text-[#C98A2B]" /> Commandes en attente
        </h2>
        {pendingItems.length === 0 ? (
          <p className="text-sm text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">Aucune commande en attente. Va dans l'onglet Stock pour en ajouter.</p>
        ) : (
          <>
            <div className="grid sm:grid-cols-2 gap-3">
              {pendingItems.map((p) => (
                <div key={p.id} className="border border-[#1F2421]/15 bg-white px-4 py-3 flex items-center justify-between rounded-xl shadow-sm hover:shadow-md transition-shadow duration-200">
                  <div>
                    <div className="font-medium">{p.name}</div>
                    <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">
                      {p._qty} {p._orderUnit.label} · {suppliersById[getPreferred(p)?.supplierId]?.name || "—"}
                    </div>
                  </div>
                  <span className="text-sm font-['IBM_Plex_Mono',monospace] text-[#C98A2B]">
                    {(p._stockEquiv * p._price).toFixed(2)} €
                  </span>

function StatCard({ label, value }) {
  return (
    <div className="text-white px-4 py-3 rounded-xl shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-200" style={{ background: "linear-gradient(135deg, #1F2421 0%, #2a2f2b 100%)" }}>
      <div className="text-2xl font-['IBM_Plex_Mono',monospace] font-medium">{value}</div>
      <div className="text-[10px] uppercase tracking-wide text-white/70 mt-1">{label}</div>
    </div>
  );
}

function StockView({ products, categories, zones, suppliersById, onEdit, onAdjust, onDelete, onAdd, pendingOrders, onSetOrderQuantity, onRemoveOrder, onResetAll, onBulkUpdate }) {
  const [orderingId, setOrderingId] = useState(null);
  const [draftQty, setDraftQty] = useState("1");
  const [sortBy, setSortBy] = useState("name");
  const [filterCategory, setFilterCategory] = useState("");
  const [showBulk, setShowBulk] = useState(false);
  const [bulkFilterType, setBulkFilterType] = useState("category");
  const [bulkFilterValue, setBulkFilterValue] = useState("");
  const [bulkField, setBulkField] = useState("zone");
  const [bulkValue, setBulkValue] = useState("");

  const startOrder = (p, existing) => {
    setOrderingId(p.id);
    setDraftQty(existing ? String(existing.quantity) : "1");
  };
  const confirmOrder = (productId) => {
    const q = Number(draftQty);
    if (!q || q <= 0) return;
    onSetOrderQuantity(productId, q);
    setOrderingId(null);
  };

  const matchCount = products.filter((p) => {
    if (!bulkFilterValue) return false;
    return bulkFilterType === "category" ? p.category === bulkFilterValue : p.zone === bulkFilterValue;
  }).length;

  const applyBulk = () => {
    if (!bulkFilterValue || !bulkValue) return;
    onBulkUpdate({
      filterCategory: bulkFilterType === "category" ? bulkFilterValue : null,
      filterZone: bulkFilterType === "zone" ? bulkFilterValue : null,
      field: bulkField,
      value: bulkValue,
    });
    setBulkValue("");
  };

  const groupKey = sortBy === "category" ? "category" : sortBy === "zone" ? "zone" : null;
  const filtered = filterCategory ? products.filter((p) => p.category === filterCategory) : products;
  const sorted = [...filtered].sort((a, b) => {
    if (groupKey) {
      const ga = a[groupKey] || "—", gb = b[groupKey] || "—";
      if (ga !== gb) return ga.localeCompare(gb, "fr");
    }
    return a.name.localeCompare(b.name, "fr");
  });
  let lastGroup = null;

  return (
    <div>
      <div className="flex items-center justify-between mb-4 gap-2 flex-wrap">
        <h2 className="text-lg font-medium">Inventaire</h2>
        <div className="flex items-center gap-2 flex-wrap">
          <select className={`${inputCls} w-auto`} value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)}>
            <option value="">Toutes les catégories</option>
            {categories.map((c) => <option key={c} value={c}>{c}</option>)}
          </select>
          <select className={`${inputCls} w-auto`} value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
            <option value="name">Trier par nom</option>
            <option value="category">Trier par catégorie</option>
            <option value="zone">Trier par zone</option>
          </select>
          <button onClick={onAdd} className="flex items-center gap-1.5 text-white text-sm px-3 py-2 shrink-0 rounded-lg shadow-sm hover:opacity-90 hover:shadow-md active:scale-[0.97] transition-all duration-150" style={{ backgroundColor: "#2F4F3E" }}>
            <Icon name="plus" size={15} /> Ajouter un produit
          </button>
          <button onClick={onResetAll} className="flex items-center gap-1.5 text-sm px-3 py-2 shrink-0 border rounded-lg hover:bg-[#8B3A2B] hover:text-white active:scale-[0.97] transition-all duration-150" style={{ borderColor: "#8B3A2B", color: "#8B3A2B" }}>
            <Icon name="trash" size={14} /> Remettre les stocks à 0
          </button>
          <button onClick={() => setShowBulk((v) => !v)} className="flex items-center gap-1.5 text-sm px-3 py-2 shrink-0 border rounded-lg hover:bg-[#1F2421] hover:text-white active:scale-[0.97] transition-all duration-150" style={{ borderColor: "#1F2421", color: "#1F2421" }}>
            <Icon name="clipboardCheck" size={14} /> Modification en masse
          </button>
        </div>
      </div>

      {showBulk && (
        <div className="mb-4 p-4 rounded-xl border border-[#1F2421]/15 bg-white space-y-3">
          <div className="text-sm font-medium">Modifier plusieurs produits d'un coup</div>
          <div className="grid grid-cols-2 gap-2">
            <Field label="Produits concernés">
              <select className={inputCls} value={bulkFilterType} onChange={(e) => { setBulkFilterType(e.target.value); setBulkFilterValue(""); }}>
                <option value="category">Par catégorie</option>
                <option value="zone">Par zone</option>
              </select>
            </Field>
            <Field label={bulkFilterType === "category" ? "Catégorie" : "Zone"}>
              <select className={inputCls} value={bulkFilterValue} onChange={(e) => setBulkFilterValue(e.target.value)}>
                <option value="">Choisir…</option>
                {(bulkFilterType === "category" ? categories : zones).map((v) => <option key={v} value={v}>{v}</option>)}
              </select>
            </Field>
            <Field label="Modifier">
              <select className={inputCls} value={bulkField} onChange={(e) => { setBulkField(e.target.value); setBulkValue(""); }}>
                <option value="zone">Assigner la zone</option>
                <option value="category">Assigner la catégorie</option>
              </select>
            </Field>
            <Field label="Nouvelle valeur">
              <select className={inputCls} value={bulkValue} onChange={(e) => setBulkValue(e.target.value)}>
                <option value="">Choisir…</option>
                {(bulkField === "category" ? categories : zones).map((v) => <option key={v} value={v}>{v}</option>)}
              </select>
            </Field>
          </div>
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <p className="text-xs text-[#5B5A50]">
              {bulkFilterValue ? `${matchCount} produit(s) concerné(s).` : "Choisis d'abord les produits concernés."}
            </p>
            <button
              onClick={applyBulk}
              disabled={!bulkFilterValue || !bulkValue}
              className="text-sm px-4 py-2 rounded-lg text-white disabled:opacity-40 shadow-sm hover:opacity-90 active:scale-[0.97] transition-all duration-150"
              style={{ backgroundColor: "#2F4F3E" }}
            >
              Appliquer {matchCount > 0 ? `à ${matchCount} produit(s)` : ""}
            </button>
          </div>
        </div>
      )}
      <div className="space-y-2">
        {sorted.map((p) => {
          const pref = getPreferred(p);
          const altCount = (p.suppliers || []).length - (pref ? 1 : 0);
          const orderUnit = getOrderUnit(p);
          const existingOrder = pendingOrders.find((o) => o.productId === p.id);
          const isOrdering = orderingId === p.id;
          const groupValue = groupKey ? (p[groupKey] || "Sans " + (groupKey === "category" ? "catégorie" : "zone")) : null;
          const showHeader = groupKey && groupValue !== lastGroup;
          if (showHeader) lastGroup = groupValue;
          return (
            <React.Fragment key={p.id}>
              {showHeader && (
                <div className="text-[11px] uppercase tracking-wide text-[#5B5A50] pt-3 first:pt-0 pb-1 border-b border-[#1F2421]/10">
                  {groupValue}
                </div>
              )}
            <div className="bg-white border border-[#1F2421]/10 px-3 py-2.5 rounded-xl shadow-sm hover:shadow-md transition-shadow duration-200">
              <div className="flex items-center gap-2">
                <span className="font-medium truncate">{p.name}</span>
                <span className="text-[10px] uppercase text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">{p.category}</span>
                {p.zone && <span className="text-[10px] uppercase text-[#2F4F3E] border border-[#2F4F3E]/30 px-1">{p.zone}</span>}
              </div>
              <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace] mb-2">
                {pref ? (
                  <>★ {suppliersById[pref.supplierId]?.name || "—"} · {Number(pref.price).toFixed(2)} €/{p.unit}{pref.ref && <> · réf. {pref.ref}</>}</>
                ) : (
                  "Sans fournisseur"
                )}
                {altCount > 0 && <> · +{altCount} autre{altCount > 1 ? "s" : ""}</>}
                {p.packaging && <> · {p.packaging}</>}
              </div>

              <div className="flex flex-wrap items-center gap-2 font-['IBM_Plex_Mono',monospace]">
                <button onClick={() => onAdjust(p.id, -1)} className="w-7 h-7 border border-[#1F2421]/20 rounded-lg hover:bg-[#F5F2EC] active:scale-90 transition-all duration-150">−</button>
                <span className="w-14 text-center text-sm">{p.quantity} {p.unit}</span>
                <button onClick={() => onAdjust(p.id, 1)} className="w-7 h-7 border border-[#1F2421]/20 rounded-lg hover:bg-[#F5F2EC] active:scale-90 transition-all duration-150">+</button>

                {!isOrdering && (
                  <button
                    onClick={() => startOrder(p, existingOrder)}
                    disabled={!pref}
                    className="flex items-center gap-1 text-xs px-2 py-1.5 border rounded-lg hover:shadow-sm active:scale-[0.97] transition-all duration-150"
                    style={existingOrder
                      ? { backgroundColor: "#2F4F3E", color: "#FFFFFF", borderColor: "#2F4F3E" }
                      : { color: pref ? "#1F2421" : "#5B5A50", borderColor: "#1F2421", opacity: pref ? 1 : 0.4 }
                    }
                  >
                    <Icon name="clipboard" size={13} /> {existingOrder ? `Commandé : ${existingOrder.quantity} ${orderUnit.label}` : "Commander"}
                  </button>
                )}
                <span className="flex-1" />
                <button onClick={() => onEdit(p)} className="text-xs text-[#2F4F3E] underline underline-offset-2 px-1">modifier</button>
                <button onClick={() => onDelete(p.id)} className="text-[#8B3A2B] p-1.5 rounded-lg hover:bg-[#8B3A2B]/10 active:scale-90 transition-all duration-150"><Icon name="trash" size={15} /></button>
              </div>

              {isOrdering && (
                <div className="mt-2 pt-2 border-t border-[#1F2421]/10 flex flex-wrap items-center gap-2">
                  <span className="text-xs text-[#5B5A50] uppercase tracking-wide">Quantité à commander</span>
                  <QuantityStepper value={draftQty} onChange={setDraftQty} />
                  <span className="text-xs text-[#5B5A50]">
                    {orderUnit.label}{orderUnit.size > 1 && Number(draftQty) > 0 && (
                      <> (≈ {(Number(draftQty) * orderUnit.size).toFixed(1)} {p.unit})</>
                    )}

                  <button
                    onClick={() => confirmOrder(p.id)}
                    className="flex items-center gap-1 text-xs px-2 py-1.5 font-medium rounded-lg shadow-sm hover:opacity-90 active:scale-[0.97] transition-all duration-150"
                    style={{ backgroundColor: "#2F4F3E", color: "#FFFFFF" }}
                  >
                    <Icon name="check" size={13} /> Valider
                  </button>
                  {existingOrder && (
                    <button
                      onClick={() => { onRemoveOrder(p.id); setOrderingId(null); }}
                      className="text-xs text-[#8B3A2B] underline underline-offset-2"
                    >
                      Retirer de la commande
                    </button>
                  )}
                  <button onClick={() => setOrderingId(null)} className="text-xs text-[#5B5A50] underline underline-offset-2">
                    Annuler
                  </button>
                </div>
              )}
            </div>
            </React.Fragment>
          );
        })}
        {sorted.length === 0 && (
          <p className="text-sm text-[#5B5A50]">
            {filterCategory ? "Aucun produit dans cette catégorie." : "Aucun produit. Ajoute ton premier article."}
          </p>
        )}
      </div>
    </div>
  );
}

function InventoryPage({ products, categoryFilter, suppliersById, pendingOrders, draft, onDraftChange, onCancel, onFinish }) {
  const [counts, setCounts] = useState(() => {
    if (draft?.counts) return { ...Object.fromEntries(products.map((p) => [p.id, "0"])), ...draft.counts };
    return Object.fromEntries(products.map((p) => [p.id, "0"]));
  });
  const [orders, setOrders] = useState(() => {
    const base = Object.fromEntries(products.map((p) => {
      const existing = pendingOrders.find((o) => o.productId === p.id);
      return [p.id, existing ? String(existing.quantity) : ""];
    }));
    return draft?.orders ? { ...base, ...draft.orders } : base;
  });

  // Sauvegarde le brouillon automatiquement au fur et à mesure de la saisie
  useEffect(() => {
    const t = setTimeout(() => {
      onDraftChange({ categoryFilter, counts, orders, updatedAt: new Date().toISOString() });
    }, 500);
    return () => clearTimeout(t);
  }, [counts, orders]);

  const sorted = [...products].sort((a, b) => {
    const ca = a.category || "—", cb = b.category || "—";
    if (ca !== cb) return ca.localeCompare(cb, "fr");
    return a.name.localeCompare(b.name, "fr");
  });
  let lastCategory = null;

  return (
    <Page
      title={categoryFilter ? `Inventaire — ${categoryFilter}` : `Inventaire du ${formatDate(new Date().toISOString())}`}
      onCancel={onCancel}
      onSave={() => onFinish({ counts, orders })}
      saveLabel="Terminer l'inventaire"
    >
      <p className="text-xs text-[#5B5A50] mb-3">
        Compte chaque produit et, si besoin, indique directement la quantité à commander auprès du fournisseur préféré. Ta progression est enregistrée automatiquement — tu peux fermer et reprendre plus tard.
      </p>
      <div className="space-y-2">
        {sorted.map((p) => {
          const pref = getPreferred(p);
          const orderUnit = getOrderUnit(p);
          const orderQty = Number(orders[p.id]);
          const cat = p.category || "—";
          const showHeader = cat !== lastCategory;
          if (showHeader) lastCategory = cat;
          return (
            <React.Fragment key={p.id}>
              {showHeader && (
                <div className="text-[11px] uppercase tracking-wide text-[#5B5A50] pt-3 first:pt-0 pb-1 border-b border-[#1F2421]/10">
                  {cat}
                </div>
              )}
            <div className="border border-[#1F2421]/10 px-3 py-2.5">
              <div className="flex items-center gap-2">
                <span className="font-medium truncate">{p.name}</span>
                <span className="text-[10px] uppercase text-[#5B5A50] font-['IBM_Plex_Mono',monospace]">{p.category}</span>
                {p.zone && <span className="text-[10px] uppercase text-[#2F4F3E] border border-[#2F4F3E]/30 px-1">{p.zone}</span>}
              </div>
              <div className="text-xs text-[#5B5A50] font-['IBM_Plex_Mono',monospace] mb-2">
                {pref ? `★ ${suppliersById[pref.supplierId]?.name || "—"}` : "Sans fournisseur"}
                {p.packaging && <> · {p.packaging}</>}
              </div>
              <div className="grid grid-cols-2 gap-2">
                <Field label={`Stock compté (${p.unit})`}>
                  <QuantityStepper
                    value={counts[p.id]}
                    step={p.unit === "kg" || p.unit === "L" ? 0.5 : 1}
                    onChange={(v) => setCounts({ ...counts, [p.id]: v })}
                  />
                </Field>
                <Field label={`À commander (${orderUnit.label})`}>
                  <QuantityStepper
                    value={orders[p.id]}
                    disabled={!pref}
                    onChange={(v) => setOrders({ ...orders, [p.id]: v })}
                  />
                </Field>
              </div>
              {orderUnit.size > 1 && orderQty > 0 && (
                <p className="text-[11px] text-[#5B5A50] mt-1">≈ {(orderQty * orderUnit.size).toFixed(1)} {p.unit}</p>
              )}
            </div>
            </React.Fragment>
          );
        })}
        {products.length === 0 && (
          <p className="text-sm text-[#5B5A50]">Aucun produit dans cette catégorie.</p>
        )}
      </div>
      <div className="mt-5 pt-4 border-t border-[#1F2421]/15">
        <button onClick={onCancel} className="w-full py-2.5 text-sm text-[#5B5A50] underline underline-offset-2">Annuler</button>
      </div>
    </Page>
  );
}

function InvoiceCheckPage({ record, products, suppliers, restaurantName, savedInHistory, onClose, onValidateReception }) {
  const isManual = !!record.manual;

  const [lines, setLines] = useState(() =>
    record.items.map((it) => ({
      productId: it.productId || "",
      name: it.name,
      ref: it.ref || "",
      orderedQty: Number(it.quantity) || 0,
      unit: it.unit,
      invoicedQty: record.received
        ? String(record.received.items.find((_, idx) => record.items[idx] === it)?.received ?? it.quantity)
        : String(it.quantity),
      unitPrice: String(it.price || 0),
      status: "ok",
      note: "",
    }))
  );
  const [supplierId, setSupplierId] = useState(record.supplierId || "");
  const [newProductId, setNewProductId] = useState("");
  const [newQty, setNewQty] = useState("1");
  const [saved, setSaved] = useState(!!record.received);
  const [showReport, setShowReport] = useState(false);
  const [reportComment, setReportComment] = useState("");
  const [reportCopied, setReportCopied] = useState(false);

  // Aide optionnelle : lecture automatique du texte de la facture
  const [preview, setPreview] = useState(null);
  const [isPdf, setIsPdf] = useState(false);
  const [currentFile, setCurrentFile] = useState(null);
  const [engine, setEngine] = useState("2");
  const [ocrText, setOcrText] = useState("");
  const [ocrStatus, setOcrStatus] = useState("idle");
  const [ocrError, setOcrError] = useState("");
  const [showOcr, setShowOcr] = useState(false);

  const supplierName = suppliers?.find((s) => s.id === supplierId)?.name || record.supplierName || "";

  const updateLine = (i, patch) => setLines((arr) => arr.map((l, idx) => (idx === i ? { ...l, ...patch } : l)));
  const setInvoicedQty = (i, v) => {
    const l = lines[i];
    const nextStatus = l.status === "refused" ? "refused" : (Number(v) !== l.orderedQty ? "diff" : "ok");
    updateLine(i, { invoicedQty: v, status: nextStatus });
    setSaved(false);
  };
  const setLineStatus = (i, status) => { updateLine(i, { status }); setSaved(false); };
  const setNote = (i, note) => { updateLine(i, { note }); setSaved(false); };

  const addLine = () => {
    const product = products.find((p) => p.id === newProductId);
    if (!product) return;
    const pref = getPreferred(product);
    const qty = Number(newQty) || 0;
    if (qty <= 0) return;
    setLines((arr) => [...arr, {
      productId: product.id, name: product.name, ref: pref?.ref || "",
      orderedQty: 0, unit: product.unit, invoicedQty: String(qty),
      unitPrice: String(pref?.price || 0), status: "ok", note: "",
    }]);
    setNewProductId("");
    setNewQty("1");
    setSaved(false);
  };
  const removeLine = (i) => { setLines((arr) => arr.filter((_, idx) => idx !== i)); setSaved(false); };

  const problemLines = lines.filter((l) => l.status === "diff" || l.status === "refused");

  const validate = () => {
    if (lines.length === 0) return;
    const receivedQtys = lines.map((l) => (l.status === "refused" ? "0" : l.invoicedQty));
    const itemsForStock = lines.map((l) => ({
      productId: l.productId, name: l.name, ref: l.ref,
      quantity: l.orderedQty || Number(l.invoicedQty) || 0,
      unit: l.unit, stockUnit: l.unit,
      price: Number(l.unitPrice) || 0,
      stockEquiv: l.orderedQty || Number(l.invoicedQty) || 0,
    }));
    onValidateReception(receivedQtys, itemsForStock, { supplierId, supplierName });
    setSaved(true);
  };

  const analyze = async (rawFile, engineOverride) => {
    setOcrStatus("loading");
    setOcrError("");
    setOcrText("");
    try {
      const prepared = await new Promise((resolve) => {
        if (!rawFile.type.startsWith("image/")) { resolve(rawFile); return; }
        const img = new Image();
        img.onload = () => {
          const maxDim = 2000;
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            const ratio = Math.min(maxDim / width, maxDim / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#FFFFFF";
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob((blob) => resolve(blob ? new File([blob], rawFile.name || "facture.jpg", { type: "image/jpeg" }) : rawFile), "image/jpeg", 0.85);
        };
        img.onerror = () => resolve(rawFile);
        img.src = URL.createObjectURL(rawFile);
      });
      const form = new FormData();
      form.append("apikey", OCRSPACE_API_KEY);
      form.append("file", prepared);
      form.append("filetype", prepared.type.includes("pdf") ? "PDF" : "AUTO");
      form.append("language", "fre");
      form.append("OCREngine", engineOverride || engine);
      form.append("scale", "true");
      form.append("isTable", "true");
      form.append("detectOrientation", "true");
      const res = await fetch("https://api.ocr.space/parse/image", { method: "POST", body: form });
      const json = await res.json();
      if (json.IsErroredOnProcessing) throw new Error((json.ErrorMessage && json.ErrorMessage.join(", ")) || "Erreur d'analyse OCR");
      const text = (json.ParsedResults || []).map((r) => r.ParsedText).join("\n").trim();
      setOcrText(text || "(Aucun texte détecté.)");
      setOcrStatus("done");
    } catch (e) {
      setOcrError(e.message || String(e));
      setOcrStatus("error");
    }
  };
  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setIsPdf(file.type.includes("pdf"));
    setCurrentFile(file);
    setPreview(URL.createObjectURL(file));
    analyze(file);
  };
  const retryWithOtherEngine = () => {
    const next = engine === "2" ? "1" : "2";
    setEngine(next);
    if (currentFile) analyze(currentFile, next);
  };

  const statusStyles = {
    ok: { bg: "#EAF2ED", color: "#2F4F3E", label: "Conforme" },
    diff: { bg: "#FBF3E4", color: "#C98A2B", label: "Écart" },

  const reportText = () => {

    }).join("\n");
    const comment = reportComment ? `\n\nCommentaire :\n${reportComment}` : "";
    return header + body + comment;
  };
  const copyReport = async () => {
    try {
      await navigator.clipboard.writeText(reportText());
      setReportCopied(true);
      setTimeout(() => setReportCopied(false), 2000);

        </div>
        <div className="max-w-2xl mx-auto p-6 sm:p-10">

              <div className="text-[11px] uppercase tracking-[0.2em] text-[#C98A2B] mt-1">Compte-rendu de non-conformité</div>
              <div className="text-sm text-[#5B5A50] mt-2">Fournisseur : {supplierName || "—"} · {formatDate(new Date().toISOString())}</div>
            </div>
            <table className="w-full text-sm mb-6">
              <thead>
                <tr className="border-b-2 border-[#1F2421] text-left text-[10px] uppercase tracking-wide text-[#5B5A50]">
                  <th className="py-2">Article</th>
                  <th className="py-2">Statut</th>
                  <th className="py-2 text-right">Commandé</th>
                  <th className="py-2 text-right">Facturé/reçu</th>
                </tr>
              </thead>
              <tbody className="font-['IBM_Plex_Mono',monospace]">
                {problemLines.map((l, i) => (
                  <tr key={i} className="border-b border-[#1F2421]/10">
                    <td className="py-2.5 pr-2 font-['Newsreader',Georgia,serif]">{l.name}{l.ref && <div className="text-[11px] text-[#5B5A50]">réf. {l.ref}</div>}{l.note && <div className="text-[11px] text-[#5B5A50]">{l.note}</div>}</td>
                    <td className="py-2.5" style={{ color: statusStyles[l.status].color }}>{statusStyles[l.status].label}</td>
                    <td className="py-2.5 text-right whitespace-nowrap">{l.orderedQty} {l.unit}</td>
                    <td className="py-2.5 text-right whitespace-nowrap">{l.invoicedQty} {l.unit}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="no-print mb-6">
              <Field label="Commentaire / demande d'avoir">
                <textarea
                  value={reportComment}
                  onChange={(e) => setReportComment(e.target.value)}
                  className={inputCls + " h-24"}
                  placeholder="Ex. Merci de bien vouloir établir un avoir pour les écarts constatés."
                />

            {reportComment && <p className="text-sm border-t border-[#1F2421]/15 pt-4">{reportComment}</p>}

          >
            <Icon name="check" size={15} /> {reportCopied ? "Copié !" : "Copier le compte-rendu"}
          </button>
        </div>
      </div>
    );
  }

  return (

      </div>

      <div className="max-w-3xl mx-auto p-4 sm:p-6">

        {isManual && (

          </div>

          <div className="mt-4 pt-4 border-t border-[#1F2421]/15 flex items-end gap-2">
            <div className="flex-1">
              <Field label="Ajouter une ligne (produit)">
                <select className={inputCls} value={newProductId} onChange={(e) => setNewProductId(e.target.value)}>
                  <option value="">Choisir un produit…</option>
                  {(products || []).map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </Field>
            </div>
            <div className="w-24">
              <Field label="Qté">
                <input type="number" step="0.1" className={inputCls} value={newQty} onChange={(e) => setNewQty(e.target.value)} />
              </Field>
            </div>
            <button onClick={addLine} disabled={!newProductId} className="h-[38px] px-3 rounded-lg text-white shrink-0 disabled:opacity-40" style={{ backgroundColor: "#2F4F3E" }}>
              <Icon name="plus" size={15} />
            </button>
          </div>
        </div>

        <div className="space-y-2 mb-4">
          <button
            onClick={validate}
            disabled={lines.length === 0}
            className="w-full flex items-center justify-center gap-2 py-2.5 text-sm font-medium text-white rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all duration-150 disabled:opacity-40"
            style={{ backgroundColor: saved ? "#5B5A50" : "#2F4F3E" }}
          >
            <Icon name="check" size={15} /> {saved ? "Réception enregistrée ✓ (revalider)" : "Valider la réception et mettre à jour le stock"}
          </button>

          {problemLines.length > 0 && (
            <button
              onClick={() => setShowReport(true)}
              className="w-full flex items-center justify-center gap-2 py-2.5 text-sm font-bold border-2 rounded-lg hover:bg-[#8B3A2B] hover:text-white transition-all duration-150"
              style={{ borderColor: "#8B3A2B", color: "#8B3A2B" }}
            >
              <Icon name="file" size={15} /> Générer un compte-rendu / demande d'avoir ({problemLines.length})
            </button>
          )}
        </div>

        <details className="text-sm" open={showOcr} onToggle={(e) => setShowOcr(e.target.open)}>
          <summary className="cursor-pointer text-[#2F4F3E] underline underline-offset-2">
            Aide : scanner la facture pour lire son texte (optionnel)
          </summary>
          <div className="mt-3 bg-white border border-[#1F2421]/15 rounded-xl shadow-sm p-4">
            <label className="flex items-center justify-center gap-2 w-full py-2.5 mb-3 text-sm font-medium border rounded-lg cursor-pointer" style={{ borderColor: "#1F2421" }}>
              <Icon name="file" size={15} /> {preview ? "Changer le document" : "Scanner ou importer un fichier"}
              <input type="file" accept="image/*,application/pdf" onChange={handleFile} className="hidden" />
            </label>
            {ocrStatus === "loading" && <p className="text-sm text-[#5B5A50] flex items-center gap-2"><Icon name="loader" className="animate-spin" size={14} /> Analyse en cours…</p>}
            {ocrStatus === "error" && <p className="text-sm text-[#8B3A2B]">Échec : {ocrError}</p>}
            {ocrStatus === "done" && (
              <>
                <textarea readOnly value={ocrText} className="w-full h-40 text-sm border border-[#1F2421]/15 rounded-lg p-2 font-['IBM_Plex_Mono',monospace]" />
                <button onClick={retryWithOtherEngine} className="mt-2 text-xs text-[#2F4F3E] underline underline-offset-2">
                  Résultat peu lisible ? Réessayer avec l'autre moteur
                </button>
              </>
            )}
            {preview && !isPdf && <img src={preview} alt="Facture" className="mt-3 w-full rounded-lg border border-[#1F2421]/15" />}
          </div>
        </details>
      </div>
    </div>
  );
}
